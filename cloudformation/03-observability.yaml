AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Usage/cost observability for the Claude apps gateway: an Amazon Managed
  Service for Prometheus (AMP) workspace, the activity-log archive chain, and
  a Grafana instance (behind the existing ALB at /grafana) with a provisioned
  usage-and-cost dashboard. The OTLP collector runs as a loopback sidecar in
  the gateway task (02-gateway.yaml), not here - this stack provides the AMP
  workspace and activity-log group it writes to. Deploy after 02-gateway.yaml
  (same NamePrefix), then set the gateway stack's ObservabilityAmpRemoteWrite
  Endpoint / ObservabilityAmpWorkspaceArn / ObservabilityActivityLogGroup from
  this stack's outputs and re-run deploy-gateway.sh.

Parameters:
  NamePrefix:
    Type: String
    Default: claude-gw
    Description: Must match the NamePrefix used by 01/02 (cross-stack imports).
    AllowedPattern: '[a-z][a-z0-9-]{1,20}'

  VpcId:
    Type: AWS::EC2::VPC::Id

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for the collector and Grafana tasks.

  GatewayFqdn:
    Type: String
    Description: The corporate CNAME (Grafana is served at https://<GatewayFqdn>/grafana).
    AllowedPattern: '^[a-z0-9.-]+\.[a-z]{2,}$'

  # The ADOT collector no longer runs here: it is a co-resident sidecar in the
  # gateway task (02-gateway.yaml). The gateway stack now carries CollectorImage
  # (the same COLLECTOR_IMAGE mirror-collector.sh produces). This stack exports
  # the AMP endpoint / ARN and the activity-log group that the sidecar needs.

  GrafanaImage:
    Type: String
    Description: >-
      Grafana image built from docker/grafana/ (bakes the AMP datasource and
      the Claude Code usage dashboard), pushed to your ECR.

  CreateAmpEndpoint:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      Create an aps-workspaces interface VPC endpoint so remote-write and
      queries to AMP stay off the NAT/TGW path. Recommended alongside
      CreateSupportingEndpoints in no-NAT VPCs.

  CreateSupportingEndpoints:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      MUST match the value passed to 02-gateway. When 02 creates the shared
      ecr/logs/secretsmanager interface endpoints (PrivateDnsEnabled), their
      DNS resolves VPC-wide to those endpoint ENIs, so the collector/Grafana
      tasks are forced onto them for image pull, awslogs, and secret
      injection. This stack then adds their SGs as 443 ingress on 02's
      endpoint SG (imported); without it those tasks are firewalled off the
      endpoints and the services never start. Leave 'false' on a NAT/TGW
      profile with no supporting endpoints.

  # ----- Grafana auth: Okta SSO (per-user accounts, no shared admin) -----
  OktaIssuer:
    Type: String
    # Grafana's generic_oauth does no OIDC discovery, so its endpoint URLs
    # are built here from the issuer + OktaAuthServerType. Accepts either the
    # org-server issuer (bare domain, no trailing slash) or a custom
    # authorization server (.../oauth2/<id>); the pattern rejects a trailing
    # slash so the derived URLs don't get a double slash.
    AllowedPattern: '^https://[a-zA-Z0-9.-]+(/oauth2/[a-zA-Z0-9._-]+)?$'
    ConstraintDescription: >-
      Must be an https Okta issuer with no trailing slash - either the org
      server (https://your-org.okta.com) or a custom authorization server
      (https://your-org.okta.com/oauth2/default). Set OktaAuthServerType to
      match.
    Description: >-
      Okta issuer for Grafana SSO - usually the same value as the gateway
      stack's OktaIssuer. Register the extra redirect URI
      https://<GatewayFqdn>/grafana/login/generic_oauth on the Okta app.

  OktaAuthServerType:
    Type: String
    Default: org
    AllowedValues: ['org', 'custom']
    Description: >-
      Which Okta authorization server OktaIssuer points at (default 'org').
      'org' = the built-in org server (issuer is the bare domain; endpoints
      live under /oauth2/v1/... and the org server has a built-in 'groups'
      scope). 'custom' = a custom authorization server (issuer already
      contains /oauth2/<id>; endpoints are <issuer>/v1/..., and you configure
      the groups claim/scope on it). Grafana's OAuth URLs are derived
      accordingly.

  HttpsProxyUrl:
    Type: String
    Default: ''
    Description: >-
      Same meaning as the gateway stack's HttpsProxyUrl, for the Grafana
      task: its server-side OAuth calls to the Okta token/userinfo
      endpoints are public egress, so in a proxy-mandated landing zone
      Grafana needs the proxy too or SSO logins time out at the code
      exchange. AWS API traffic (AMP queries) stays direct via NO_PROXY.

  HttpsProxyPort:
    Type: String
    Default: ''
    AllowedPattern: '^[0-9]*$'
    Description: >-
      Port of HttpsProxyUrl - Grafana task egress is scoped to tcp/443
      plus this port (deploy-observability.sh derives it automatically).

  GrafanaOktaClientId:
    Type: String
    Description: >-
      Okta OIDC client ID for Grafana. Reusing the gateway's Okta app (add
      the /grafana/login/generic_oauth redirect URI to it) is fine; a
      dedicated app gives independent secrets/offboarding.

  GrafanaAdminGroup:
    Type: String
    Default: grafana-admins
    Description: Okta group granted the Grafana Admin role.

  GrafanaEditorGroup:
    Type: String
    Default: ''
    Description: Optional Okta group granted the Editor role. Empty = no Editor mapping.

  GrafanaViewerGroup:
    Type: String
    Default: ''
    Description: >-
      Optional Okta group granted the Viewer role. Empty = no Viewer
      mapping. Role mapping is STRICT - an Okta user in none of these
      groups is denied login even after Okta authenticates them.

  AlarmSnsTopicArn:
    Type: String
    Default: ''
    Description: >-
      Optional SNS topic for this stack's alarms (same variable the gateway
      stack uses: ALARM_SNS_TOPIC_ARN). Empty = alarms still exist and show
      state in the console, but notify nobody.

  MissingTelemetryAlarmMinutes:
    Type: Number
    Default: 15
    MinValue: 0
    MaxValue: 1440
    Description: >-
      Fire the missing-telemetry alarm after this many consecutive minutes
      with NO samples ingested into the AMP workspace - the end-to-end
      backstop for the fail-closed telemetry posture (a healthy collector
      whose writes are not landing is invisible to container health checks;
      this alarm is what sees it). 0 disables the alarm. Expect it to fire
      legitimately between deploying this stack and the telemetry-enabled
      02 re-run, and during full-fleet gateway outages (no tasks = no
      telemetry).

  ActivityLogsAlarmMinutes:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 1440
    Description: >-
      Optional cessation alarm for the AI-activity AUDIT stream (separate
      from the metrics alarm above). Fire after this many consecutive
      minutes with NO events delivered to the activity log group. 0 (default)
      disables it. Leave OFF unless the audit stream is enabled
      (FORWARD_ACTIVITY_LOGS=true) AND the deployment has continuous
      activity - the stream is intermittent, so a window shorter than your
      longest idle gap will false-fire. Set it longer than that gap; it
      detects delivery cessation and cannot alone tell a broken pipeline
      from an idle fleet (correlate with usage metrics; watch collector
      exporter errors for the direct AU-5 signal).

  EncryptAmpWithCmk:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >-
      Encrypt the AMP workspace with the CMK. A workspace's KMS key is
      fixed at creation, so enabling this on an EXISTING deployment
      REPLACES the workspace - the old one (and every metric in it) is
      retained but orphaned, and dashboards start from zero. Existing
      deployments that must keep their usage/cost history set false.

  GrafanaDisableLoginForm:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >-
      Remove the username/password form so Okta SSO is the only login path.
      Set false temporarily for break-glass access with the provisioned
      'admin' account (password in Secrets Manager).

  ActivityLogWindowDays:
    Type: Number
    Default: 14
    MinValue: 1
    Description: >-
      CloudWatch retention for the activity-log stream (the short
      operational window). The durable copy lives in the S3 archive.

  ActivityArchiveRetentionDays:
    Type: Number
    Default: 731
    MinValue: 1
    Description: Days to keep activity logs in the S3 archive before expiry.

Conditions:
  WantAmpEndpoint: !Equals [!Ref CreateAmpEndpoint, 'true']
  WantSharedEndpoints: !Equals [!Ref CreateSupportingEndpoints, 'true']
  HaveProxy: !Not [!Equals [!Ref HttpsProxyUrl, '']]
  HaveProxyPort: !Not [!Equals [!Ref HttpsProxyPort, '']]
  WantAmpCmk: !Equals [!Ref EncryptAmpWithCmk, 'true']
  HaveAlarmTopic: !Not [!Equals [!Ref AlarmSnsTopicArn, '']]
  WantMissingTelemetryAlarm: !Not [!Equals [!Ref MissingTelemetryAlarmMinutes, 0]]
  WantActivityLogsAlarm: !Not [!Equals [!Ref ActivityLogsAlarmMinutes, 0]]
  # Org server: endpoints are <issuer>/oauth2/v1/...; custom: <issuer>/v1/...
  OrgAuthServer: !Equals [!Ref OktaAuthServerType, 'org']

Resources:

  # ------------------------------------------------------------------ AMP
  # Retain: the workspace holds the full usage/cost history, and this stack
  # must be deleted before most replacement-updates of the gateway stack's
  # exported resources (see README "Teardown & update order") - without
  # Retain that routine recovery step would destroy the metrics.
  Workspace:
    Type: AWS::APS::Workspace
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Alias: !Sub '${NamePrefix}-usage'
      # CMK is creation-time only for AMP - adding it later REPLACES the
      # workspace (see EncryptAmpWithCmk).
      KmsKeyArn: !If
        - WantAmpCmk
        - Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
        - !Ref 'AWS::NoValue'

  # Missing-telemetry alarm - the END-TO-END backstop for the fail-closed
  # telemetry posture (SECURITY_REVIEW C2 / AU-5). The sidecar's container
  # health check proves the collector process is healthy; only this alarm
  # proves samples are actually LANDING in the workspace (it also covers
  # sidecar-disabled-by-mistake, IAM/endpoint breakage, and AMP-side
  # ingestion failure). AMP vends usage metrics to CloudWatch as
  # AWS/Usage ResourceCount with Resource=IngestionRate, scoped to this
  # workspace via ResourceId. CRITICAL: when nothing is ingested the metric
  # goes MISSING rather than reporting 0 ("a metric not existing or missing
  # is the same as the value of that metric being 0" - AMP docs), so
  # TreatMissingData MUST be breaching; the CloudWatch default ('missing')
  # would park a dead pipeline in INSUFFICIENT_DATA forever. GovCloud
  # emission of the vended metrics is doc-implied but needs the live check:
  #   aws cloudwatch list-metrics --namespace AWS/Usage \
  #     --dimensions Name=Service,Value=Prometheus --region us-gov-west-1
  MissingTelemetryAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: WantMissingTelemetryAlarm
    Properties:
      AlarmName: !Sub '${NamePrefix}-missing-telemetry'
      AlarmDescription: !Sub >-
        No usage/cost METRICS have been ingested into the ${NamePrefix} AMP
        workspace for ${MissingTelemetryAlarmMinutes} minutes. (Scope: the
        AMP metrics pipeline only - the activity AUDIT stream is a separate
        collector pipeline watched by ${NamePrefix}-missing-activity-logs
        when ActivityLogsAlarmMinutes > 0.) Triage order (O&M runbook 9): gateway
        service running? otel-collector container healthy (otel/ log
        streams)? task role / aps endpoint reachable? AMP throttling
        (DiscardedSamples)? Expected to fire between deploying this stack and
        the telemetry-enabled gateway re-run, and during full gateway outages.
      Namespace: AWS/Usage
      MetricName: ResourceCount
      Dimensions:
        - { Name: Service, Value: Prometheus }
        - { Name: Resource, Value: IngestionRate }
        - { Name: Type, Value: Resource }
        - { Name: Class, Value: 'None' }
        - { Name: ResourceId, Value: !GetAtt Workspace.WorkspaceId }
      Statistic: Average
      Period: 60
      EvaluationPeriods: !Ref MissingTelemetryAlarmMinutes
      Threshold: 0
      ComparisonOperator: LessThanOrEqualToThreshold
      # Missing = not ingesting = the alarm condition (see the note above).
      TreatMissingData: breaching
      AlarmActions: !If [HaveAlarmTopic, [!Ref AlarmSnsTopicArn], !Ref 'AWS::NoValue']
      OKActions: !If [HaveAlarmTopic, [!Ref AlarmSnsTopicArn], !Ref 'AWS::NoValue']

  # Companion cessation alarm for the AI-activity AUDIT stream (AU-2/AU-12).
  # The missing-telemetry alarm above watches only the AMP METRICS pipeline;
  # the audit stream is a SEPARATE collector pipeline (awscloudwatchlogs
  # exporter -> this ActivityLogGroup -> SubscriptionFilter -> Firehose ->
  # S3), so a logs-only failure - the exporter erroring while metrics keep
  # flowing, or forwarding silently not taking - is invisible to both the
  # metrics alarm and the collector's health check. This alarm can close that
  # gap by watching AWS/Logs IncomingLogEvents on the group.
  # OFF BY DEFAULT (ActivityLogsAlarmMinutes=0), and deliberately NOT auto-
  # enabled with activity forwarding, because UNLIKE metrics (the gateway
  # emits those continuously) the audit stream is INTERMITTENT - it only
  # produces events when developers actually run tools, so a short window
  # would false-fire every idle night/weekend and train operators to ignore
  # it. Enable it (set the window > your longest expected quiet gap) ONLY on
  # deployments with continuous activity, and understand its inherent limit:
  # it detects cessation of DELIVERY and cannot by itself distinguish a
  # broken pipeline from genuine inactivity - correlate with usage metrics
  # and watch the collector's otel/ streams for awscloudwatchlogs exporter
  # errors (the more direct AU-5 signal). GovCloud emission of AWS/Logs
  # metrics is doc-implied; confirm live alongside the AMP check.
  MissingActivityLogsAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: WantActivityLogsAlarm
    Properties:
      AlarmName: !Sub '${NamePrefix}-missing-activity-logs'
      AlarmDescription: !Sub >-
        The AI-activity AUDIT stream has delivered NO events to
        ${NamePrefix}'s activity log group for ${ActivityLogsAlarmMinutes}
        minutes - the audit trail may not be recording even if usage metrics
        still flow. Triage (O&M runbook 9): gateway/collector healthy?
        awscloudwatchlogs exporter errors in the otel/ streams? task role
        logs: permissions on the activity group? NOTE: a genuinely idle fleet
        also reads as silence - correlate with usage metrics before declaring
        a fault.
      Namespace: AWS/Logs
      MetricName: IncomingLogEvents
      Dimensions:
        - { Name: LogGroupName, Value: !Ref ActivityLogGroup }
      Statistic: Sum
      Period: 60
      EvaluationPeriods: !Ref ActivityLogsAlarmMinutes
      Threshold: 0
      ComparisonOperator: LessThanOrEqualToThreshold
      # AWS/Logs stops emitting IncomingLogEvents when no events arrive, so
      # missing = no audit delivery = the alarm condition.
      TreatMissingData: breaching
      AlarmActions: !If [HaveAlarmTopic, [!Ref AlarmSnsTopicArn], !Ref 'AWS::NoValue']
      OKActions: !If [HaveAlarmTopic, [!Ref AlarmSnsTopicArn], !Ref 'AWS::NoValue']

  # ------------------------------------------------------------ collector
  # The OTLP collector is NO LONGER a service here. It runs as a loopback
  # SIDECAR inside the gateway task (02-gateway.yaml): the former plaintext
  # gateway->collector network hop is eliminated, closing SC-8 by absence of
  # transmission (the gateway refuses a non-HTTPS forward_to unless the host
  # is localhost - live-run lesson; see SECURITY_REVIEW C2). This stack now
  # only provides the destinations the sidecar writes to: the AMP workspace
  # (WorkspacePrometheusEndpoint / WorkspaceArn) and the activity-log group.
  # The sidecar runs under the gateway TaskRole, which 02 scopes to those.

  # Let the Grafana tasks reach 02's shared interface endpoints
  # (ecr/logs/secretsmanager) for image pull, awslogs, and secret injection.
  # 02's endpoint SG admits only the gateway + db-admin SGs; this adds the
  # Grafana SG (cross-stack: modify an imported 02 SG). Only when 02 actually
  # created those endpoints (CreateSupportingEndpoints=true) - otherwise the
  # endpoint SG / export does not exist and this is unnecessary.
  GrafanaToEndpointsIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: WantSharedEndpoints
    Properties:
      GroupId:
        Fn::ImportValue: !Sub '${NamePrefix}-endpoint-sg'
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref GrafanaSecurityGroup
      Description: TLS from the Grafana tasks

  # ------------------------------------------------------- activity logs
  # AI activity audit stream (bash commands, tool inputs, file paths per
  # user; prompt content stays redacted). Data flows only when the gateway
  # stack sets ForwardActivityLogs=true - until then this chain is idle and
  # costs nothing (Firehose DirectPut and S3 bill per GB only). Short
  # CloudWatch window for operational queries; durable copy in S3.
  ActivityLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/claude/${NamePrefix}/activity'
      RetentionInDays: !Ref ActivityLogWindowDays
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
      # Load-bearing on already-deployed stacks (CFN no-op bug #1543) — see
      # the gateway stack's LogGroup comment. Do not remove.
      Tags:
        - Key: retention-policy
          Value: retain-on-teardown

  ActivityArchiveBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID:
                Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Id: expire-activity-archive
            Status: Enabled
            ExpirationInDays: !Ref ActivityArchiveRetentionDays

  ActivityFirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${NamePrefix}-activity-firehose'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: firehose.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: write-archive
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt ActivityArchiveBucket.Arn
                  - !Sub '${ActivityArchiveBucket.Arn}/*'
              # Writing to the SSE-KMS bucket needs the CMK.
              - Effect: Allow
                Action:
                  - kms:GenerateDataKey
                  - kms:Decrypt
                Resource:
                  Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'

  ActivityDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub '${NamePrefix}-activity-archive'
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt ActivityArchiveBucket.Arn
        RoleARN: !GetAtt ActivityFirehoseRole.Arn
        Prefix: 'activity/'
        ErrorOutputPrefix: 'errors/'
        BufferingHints:
          IntervalInSeconds: 300
          SizeInMBs: 64
        # CloudWatch subscription payloads arrive gzip-compressed already.
        CompressionFormat: UNCOMPRESSED

  ActivitySubscriptionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${NamePrefix}-activity-subscription'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: logs.amazonaws.com }
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: put-to-firehose
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - firehose:PutRecord
                  - firehose:PutRecordBatch
                Resource: !GetAtt ActivityDeliveryStream.Arn

  ActivitySubscriptionFilter:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      LogGroupName: !Ref ActivityLogGroup
      FilterPattern: ''
      DestinationArn: !GetAtt ActivityDeliveryStream.Arn
      RoleArn: !GetAtt ActivitySubscriptionRole.Arn

  # -------------------------------------------------------------- Grafana
  GrafanaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${NamePrefix} - Grafana'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId:
            Fn::ImportValue: !Sub '${NamePrefix}-alb-sg'
          Description: TLS (ALB re-encrypt) from the ALB only
      SecurityGroupEgress:
        # AMP queries + Okta OAuth + ECR pull, all TLS.
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS to AWS services and Okta
        - !If
          - HaveProxyPort
          - IpProtocol: tcp
            FromPort: !Ref HttpsProxyPort
            ToPort: !Ref HttpsProxyPort
            CidrIp: 0.0.0.0/0
            Description: Egress proxy port
          - !Ref 'AWS::NoValue'

  # The ALB's egress is scoped in 02; this opens its path to Grafana.
  AlbToGrafanaEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId:
        Fn::ImportValue: !Sub '${NamePrefix}-alb-sg'
      IpProtocol: tcp
      FromPort: 3000
      ToPort: 3000
      DestinationSecurityGroupId: !Ref GrafanaSecurityGroup
      Description: Forward/health-check to Grafana

  GrafanaAdminSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${NamePrefix}/grafana-admin-password'
      Description: >-
        Grafana 'admin' password - BREAK-GLASS ONLY. Day-to-day access is
        per-user Okta SSO; the login form is disabled unless
        GrafanaDisableLoginForm=false.
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
      GenerateSecretString:
        PasswordLength: 24
        ExcludePunctuation: true

  GrafanaOidcClientSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${NamePrefix}/grafana-oidc-client-secret'
      Description: >-
        Okta OIDC client secret for Grafana SSO. Placeholder at creation -
        set the real value with scripts/set-grafana-oidc-secret.sh.
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
      SecretString: 'REPLACE-ME-run-scripts-set-grafana-oidc-secret.sh'

  GrafanaLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/ecs/${NamePrefix}-grafana'
      RetentionInDays: 90
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
      # Load-bearing on already-deployed stacks (CFN no-op bug #1543) — see
      # the gateway stack's LogGroup comment. Do not remove.
      Tags:
        - Key: retention-policy
          Value: retain-on-teardown

  GrafanaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${NamePrefix}-grafana-execution'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
      Policies:
        - PolicyName: read-grafana-secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref GrafanaAdminSecret
                  - !Ref GrafanaOidcClientSecret
              # CMK-encrypted secrets need decrypt on the key itself.
              - Effect: Allow
                Action: kms:Decrypt
                Resource:
                  Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'

  GrafanaTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${NamePrefix}-grafana-task'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: amp-query
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - aps:QueryMetrics
                  - aps:GetSeries
                  - aps:GetLabels
                  - aps:GetMetricMetadata
                Resource: !GetAtt Workspace.Arn

  GrafanaTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${NamePrefix}-grafana'
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: '512'
      Memory: '1024'
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt GrafanaExecutionRole.Arn
      TaskRoleArn: !GetAtt GrafanaTaskRole.Arn
      ContainerDefinitions:
        - Name: grafana
          Image: !Ref GrafanaImage
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref GrafanaLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: grafana
          Environment:
            # Egress proxy for Okta (token/userinfo calls). NO_PROXY keeps
            # AMP queries on the AWS path, mirroring the gateway task.
            - !If
              - HaveProxy
              - Name: HTTP_PROXY
                Value: !Ref HttpsProxyUrl
              - !Ref 'AWS::NoValue'
            - !If
              - HaveProxy
              - Name: HTTPS_PROXY
                Value: !Ref HttpsProxyUrl
              - !Ref 'AWS::NoValue'
            - !If
              - HaveProxy
              - Name: NO_PROXY
                Value: 'localhost,127.0.0.1,169.254.169.254,169.254.170.2,.amazonaws.com'
              - !Ref 'AWS::NoValue'
            - Name: GF_SERVER_ROOT_URL
              Value: !Sub 'https://${GatewayFqdn}/grafana'
            - Name: GF_SERVER_SERVE_FROM_SUB_PATH
              Value: 'true'
            - Name: GF_AUTH_SIGV4_AUTH_ENABLED
              Value: 'true'
            - Name: GF_ANALYTICS_REPORTING_ENABLED
              Value: 'false'
            - Name: GF_ANALYTICS_CHECK_FOR_UPDATES
              Value: 'false'
            # ---- fully offline: everything Grafana needs is provisioned
            # into the image, so it must make NO grafana.com calls. In an
            # inspected-egress environment (Zscaler) those calls fail TLS
            # (MITM cert not in the container trust store), and a failing
            # startup subsystem retries into the known
            # "duplicate metrics collector registration attempted" panic
            # (grafana/grafana#92707) - a crash-loop, not a warning.
            - Name: GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES
              Value: 'false'
            # Verify bundled-plugin signatures with the key EMBEDDED in the
            # binary instead of downloading manifest keys from grafana.com.
            - Name: GF_PLUGINS_PUBLIC_KEY_RETRIEVAL_DISABLED
              Value: 'true'
            # No Grafana-side alerting (CloudWatch owns alerting in this
            # deployment); also sidesteps the Alertmanager-init retry that
            # triggers the panic above.
            - Name: GF_UNIFIED_ALERTING_ENABLED
              Value: 'false'
            - Name: GF_NEWS_NEWS_FEED_ENABLED
              Value: 'false'
            # ---- Okta SSO (generic OAuth). Per-user accounts with real
            # identity; access = Okta group membership, offboarding is
            # automatic. Identity is authoritative in Okta, so the lack of a
            # persistent Grafana volume only loses org-role tweaks made by
            # hand - users and roles re-materialize at next login.
            - Name: GF_AUTH_GENERIC_OAUTH_ENABLED
              Value: 'true'
            - Name: GF_AUTH_GENERIC_OAUTH_NAME
              Value: Okta
            - Name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              Value: !Ref GrafanaOktaClientId
            # The org server's built-in 'groups' scope returns the user's
            # groups; on a custom server you define a matching groups scope.
            - Name: GF_AUTH_GENERIC_OAUTH_SCOPES
              Value: openid profile email groups
            # Endpoint URLs differ by server type: org lives under
            # /oauth2/v1/..., custom under <issuer>/v1/... . The token 'iss'
            # is the issuer as given, so GF_AUTH..._API_URL and the derived
            # endpoints stay consistent for Grafana's iss validation.
            - Name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              Value: !If [OrgAuthServer, !Sub '${OktaIssuer}/oauth2/v1/authorize', !Sub '${OktaIssuer}/v1/authorize']
            - Name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              Value: !If [OrgAuthServer, !Sub '${OktaIssuer}/oauth2/v1/token', !Sub '${OktaIssuer}/v1/token']
            - Name: GF_AUTH_GENERIC_OAUTH_API_URL
              Value: !If [OrgAuthServer, !Sub '${OktaIssuer}/oauth2/v1/userinfo', !Sub '${OktaIssuer}/v1/userinfo']
            - Name: GF_AUTH_GENERIC_OAUTH_USE_PKCE
              Value: 'true'
            # First Okta login creates the Grafana user (this is the OAuth
            # sign-up switch, distinct from GF_USERS_ALLOW_SIGN_UP below).
            - Name: GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP
              Value: 'true'
            # Okta group -> Grafana role. STRICT: no matching group, no login.
            - Name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
              Value: !Sub >-
                contains(groups[*], '${GrafanaAdminGroup}') && 'Admin' ||
                contains(groups[*], '${GrafanaEditorGroup}') && 'Editor' ||
                contains(groups[*], '${GrafanaViewerGroup}') && 'Viewer'
            - Name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT
              Value: 'true'
            # SSO-only by default; 'false' re-enables the break-glass admin form.
            - Name: GF_AUTH_DISABLE_LOGIN_FORM
              Value: !Ref GrafanaDisableLoginForm
            # ---- Hardening
            - Name: GF_AUTH_ANONYMOUS_ENABLED
              Value: 'false'
            - Name: GF_USERS_ALLOW_SIGN_UP
              Value: 'false'
            # Gravatar phones home to gravatar.com with hashed user emails -
            # an egress dependency and a PII leak in a controlled network.
            - Name: GF_SECURITY_DISABLE_GRAVATAR
              Value: 'true'
            # TLS terminates at the ALB, so Grafana can't infer https itself.
            - Name: GF_SECURITY_COOKIE_SECURE
              Value: 'true'
            - Name: GF_AUTH_LOGIN_MAXIMUM_INACTIVE_LIFETIME_DURATION
              Value: 8h
            - Name: GF_AUTH_LOGIN_MAXIMUM_LIFETIME_DURATION
              Value: 24h
            # External snapshots publish dashboard data to snapshots.raintank.io.
            - Name: GF_SNAPSHOTS_EXTERNAL_ENABLED
              Value: 'false'
            # Consumed by the provisioned AMP datasource (docker/grafana).
            - Name: AMP_QUERY_URL
              Value: !GetAtt Workspace.PrometheusEndpoint
            - Name: AMP_REGION
              Value: !Ref AWS::Region
          Secrets:
            - Name: GF_SECURITY_ADMIN_PASSWORD
              ValueFrom: !Ref GrafanaAdminSecret
            - Name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              ValueFrom: !Ref GrafanaOidcClientSecret

  # No Name (protocol changes replace the group; a fixed name collides with
  # itself). HTTPS: the Grafana image's TLS entrypoint serves a per-task
  # self-signed cert; ALBs don't validate target certs.
  GrafanaTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VpcId
      Protocol: HTTPS
      Port: 3000
      TargetType: ip
      # ALB health checks default to HTTP even on an HTTPS target group.
      HealthCheckProtocol: HTTPS
      HealthCheckPath: /grafana/api/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  GrafanaListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn:
        Fn::ImportValue: !Sub '${NamePrefix}-https-listener'
      Priority: 10
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values: ['/grafana', '/grafana/*']
      Actions:
        - Type: forward
          TargetGroupArn: !Ref GrafanaTargetGroup

  GrafanaService:
    Type: AWS::ECS::Service
    DependsOn: GrafanaListenerRule
    Properties:
      ServiceName: !Sub '${NamePrefix}-grafana'
      Cluster:
        Fn::ImportValue: !Sub '${NamePrefix}-cluster-arn'
      # Required for the default (rolling) deployment controller; !Ref returns
      # the task-def ARN incl. revision so updates roll the service.
      TaskDefinition: !Ref GrafanaTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      HealthCheckGracePeriodSeconds: 60
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups:
            - !Ref GrafanaSecurityGroup
      LoadBalancers:
        - ContainerName: grafana
          ContainerPort: 3000
          TargetGroupArn: !Ref GrafanaTargetGroup

  # ------------------------------------------------- optional VPC endpoint
  AmpEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: WantAmpEndpoint
    Properties:
      GroupDescription: !Sub '${NamePrefix} - aps-workspaces endpoint'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        # remote_write now comes from the telemetry sidecar, which runs in the
        # gateway task under the gateway task SG (imported from 02).
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId:
            Fn::ImportValue: !Sub '${NamePrefix}-svc-sg'
          Description: remote_write from the gateway task (telemetry sidecar)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref GrafanaSecurityGroup
          Description: queries from Grafana
      # Endpoint ENIs never initiate connections.
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 127.0.0.1/32
          Description: no egress

  # The gateway task's egress is scoped in 02; this attaches its path to the
  # aps-workspaces endpoint once this stack (and the endpoint) exist. Same
  # cross-stack pattern as the former OTLP egress rule (modify an imported 02
  # SG), so it lands before the sidecar starts remote-writing. Only when the
  # endpoint exists - without it, remote_write takes the 0.0.0.0/0 :443 path
  # the gateway SG already allows.
  GatewayToAmpEndpointEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Condition: WantAmpEndpoint
    Properties:
      GroupId:
        Fn::ImportValue: !Sub '${NamePrefix}-svc-sg'
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      DestinationSecurityGroupId: !Ref AmpEndpointSecurityGroup
      Description: remote_write to the aps-workspaces endpoint (telemetry sidecar)

  AmpEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: WantAmpEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.aps-workspaces'
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref AmpEndpointSecurityGroup
      PrivateDnsEnabled: true
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ThisWorkspaceOnly
            Effect: Allow
            Principal: '*'
            Action:
              - aps:RemoteWrite
              - aps:QueryMetrics
              - aps:GetSeries
              - aps:GetLabels
              - aps:GetMetricMetadata
            Resource: !GetAtt Workspace.Arn

Outputs:
  WorkspaceId:
    Value: !GetAtt Workspace.WorkspaceId
  WorkspacePrometheusEndpoint:
    Description: >-
      Set the gateway stack's ObservabilityAmpRemoteWriteEndpoint to this value
      (deploy-observability.sh persists it as OBSERVABILITY_AMP_ENDPOINT), then
      re-run deploy-gateway.sh - the telemetry sidecar remote-writes here.
    Value: !GetAtt Workspace.PrometheusEndpoint
  WorkspaceArn:
    Description: >-
      Set the gateway stack's ObservabilityAmpWorkspaceArn to this value
      (persisted as OBSERVABILITY_AMP_WORKSPACE_ARN) - scopes the task role's
      aps:RemoteWrite.
    Value: !GetAtt Workspace.Arn
  GrafanaUrl:
    Description: Dashboard URL - sign in with Okta (role from Okta group membership).
    Value: !Sub 'https://${GatewayFqdn}/grafana'
  GrafanaOidcRedirectUri:
    Description: Register this redirect URI on the Okta app used for Grafana.
    Value: !Sub 'https://${GatewayFqdn}/grafana/login/generic_oauth'
  GrafanaOidcSecretArn:
    Description: 'Set the real client secret: scripts/set-grafana-oidc-secret.sh'
    Value: !Ref GrafanaOidcClientSecret
  GrafanaServiceName:
    Description: ECS service name (set-grafana-oidc-secret.sh rolls it after a secret change).
    Value: !GetAtt GrafanaService.Name
  GrafanaAdminSecretArn:
    Description: Break-glass local admin password (login form disabled unless GrafanaDisableLoginForm=false).
    Value: !Ref GrafanaAdminSecret
  ActivityLogGroupName:
    Description: >-
      Short-window CloudWatch group for the activity stream. Set the gateway
      stack's ObservabilityActivityLogGroup to this NAME (persisted as
      OBSERVABILITY_ACTIVITY_LOG_GROUP); the telemetry sidecar writes here and
      the chain stays idle until the gateway sets ForwardActivityLogs=true.
    Value: !Ref ActivityLogGroup
  ActivityArchiveBucketName:
    Description: Durable S3 archive of the activity stream (expires per ActivityArchiveRetentionDays).
    Value: !Ref ActivityArchiveBucket
