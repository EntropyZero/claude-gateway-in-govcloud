AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Claude apps gateway on ECS Fargate behind an internal IPv4-only ALB
  (AWS GovCloud). TLS terminates at the ALB with a certificate signed by
  your enterprise CA (imported into ACM; pass its ARN) and is re-encrypted
  to the tasks (per-task self-signed certs - SC-8 on the internal hop).
  Developers reach the gateway via a corporate-DNS CNAME that points at
  the ALB's default DNS name. Deploy 01-database.yaml first with the same
  NamePrefix.

Parameters:
  NamePrefix:
    Type: String
    Default: claude-gw
    Description: Must match the NamePrefix used by 01-database.yaml (cross-stack imports).
    AllowedPattern: '[a-z][a-z0-9-]{1,20}'

  VpcId:
    Type: AWS::EC2::VPC::Id

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: VPC CIDR - used for listen.trusted_proxies so the gateway reads real client IPs from X-Forwarded-For.
    AllowedPattern: '^\d+\.\d+\.\d+\.\d+/\d+$'

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for the ALB and the Fargate tasks (>= 2 AZs).

  ClientIngressCidr:
    Type: String
    Default: 10.0.0.0/8
    AllowedPattern: '^\d+\.\d+\.\d+\.\d+/\d+$'
    Description: >-
      CIDR allowed to reach the ALB on 443 - VPN client pool and/or the
      subnets where your Zscaler ZPA App Connectors run. Add further
      AWS::EC2::SecurityGroupIngress resources for additional ranges.

  CertificateArn:
    Type: String
    Description: >-
      ACM ARN of the enterprise-CA-signed certificate whose SAN is the
      corporate CNAME (import first with scripts/import-enterprise-cert.sh).
    AllowedPattern: '^arn:aws[a-z-]*:acm:.+'

  TlsSecurityPolicy:
    Type: String
    Default: ELBSecurityPolicy-TLS13-1-2-FIPS-2023-04
    Description: FIPS policy by default; use ELBSecurityPolicy-TLS13-1-2-2021-06 if FIPS endpoints are not mandated.

  GatewayFqdn:
    Type: String
    Description: >-
      The corporate-DNS CNAME developers use (e.g. claude-gateway.example.com).
      Becomes listen.public_url and the Okta redirect_uri host. The CNAME
      record itself is created in your corporate DNS, pointing at this
      stack's AlbDnsName output.
    AllowedPattern: '^[a-z0-9.-]+\.[a-z]{2,}$'

  ContainerImage:
    Type: String
    Description: 'ECR image URI built from docker/ (e.g. <acct>.dkr.ecr.us-gov-west-1.amazonaws.com/claude-gateway:2.1.207).'

  DesiredCount:
    Type: Number
    Default: 2
    MinValue: 1

  TaskCpu:
    Type: String
    Default: '1024'
    AllowedValues: ['512', '1024', '2048', '4096']

  TaskMemory:
    Type: String
    Default: '2048'

  OktaIssuer:
    Type: String
    # Identical to 03-observability.yaml's OktaIssuer pattern: the SAME
    # OKTA_ISSUER feeds both stacks, so a value that passes here must pass
    # there. Requires https://, allows the bare org domain or a custom
    # /oauth2/<id> server, and rejects a trailing slash - which would both
    # break the gateway's OIDC discovery (issuer mismatch) and give Grafana's
    # derived <issuer>/oauth2/v1/... URLs a double slash.
    AllowedPattern: '^https://[a-zA-Z0-9.-]+(/oauth2/[a-zA-Z0-9._-]+)?$'
    ConstraintDescription: >-
      Must be an https Okta issuer with NO trailing slash. A scheme-less or
      non-https value crash-loops the gateway ("oidc.issuer must be an http(s)
      URL"). Org server: https://your-org.okta.com. Custom server:
      https://your-org.okta.com/oauth2/<id>. Set OktaAuthServerType to match.
    Description: >-
      Okta issuer URL - INCLUDE the https:// scheme (a bare domain crash-loops
      the task). Reused verbatim for Grafana SSO in 03. A custom authorization
      server is recommended (https://your-org.okta.com/oauth2/default); the org
      server (https://your-org.okta.com) also works because userinfo_fallback
      is enabled.

  OktaClientId:
    Type: String
    Description: Client ID of the OIDC web app registered in Okta (redirect_uri = https://<GatewayFqdn>/oauth/callback).

  AllowedEmailDomains:
    Type: String
    Description: 'Comma-separated email domains accepted at sign-in (e.g.: example.com, example.gov).'

  SessionTtlHours:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 24

  AlbIdleTimeoutSeconds:
    Type: Number
    Default: 900
    MinValue: 60
    MaxValue: 4000
    Description: >-
      ALB idle timeout. Must comfortably exceed the longest silent gap in a
      streaming inference response - an extended-thinking turn can go minutes
      with no bytes on the wire, and the 60s ALB default truncates the stream
      mid-response. Keep >= 300; 900 is a safe ceiling for long turns.

  DeregistrationDelaySeconds:
    Type: Number
    Default: 300
    MinValue: 0
    MaxValue: 3600
    Description: >-
      Target-group drain time on every rolling deploy (config changes roll
      the service). Trade-off: streams still open when a deploy starts are
      cut after THIS long (not AlbIdleTimeoutSeconds), and the ALB always
      waits the FULL delay before ECS stops the old task - so every deploy
      takes this much longer per task wave. 300 protects most turns at +5
      min per deploy; raise toward the idle timeout only if cut long turns
      during deploys are unacceptable.

  CreateBedrockEndpoint:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Create a bedrock-runtime interface VPC endpoint so inference needs no NAT/IGW path.

  BedrockPrivateDns:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >-
      Private DNS on the bedrock-runtime endpoint. Set false when a
      centralized (shared-services) bedrock-runtime endpoint already
      associates a private hosted zone with this VPC - creating a second
      PrivateDnsEnabled endpoint for the same service fails the stack. Note
      that with false, traffic follows the shared PHZ to the CENTRAL
      endpoint, so apply the Claude-only endpoint policy there (see README
      "VPC endpoints").

  CreateSupportingEndpoints:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      Master switch for the interface VPC endpoints Fargate itself depends on
      - ecr.api, ecr.dkr, logs, secretsmanager, ecs (billed per AZ-hour).
      Pair with PrivateRouteTableIds for the free S3 gateway endpoint -
      without it, no-NAT image pulls still fail (ECR layers are served from
      S3). Leave false when the private subnets already have NAT egress. Note
      the gateway still needs an egress path to the Okta issuer for OIDC
      either way - no VPC endpoint can provide that. Use the per-endpoint
      toggles below to SKIP any service the landing zone already centralizes
      (a shared endpoint with a private hosted zone associated to this VPC) -
      creating a local private-DNS endpoint for the same service otherwise
      fails with a "conflicting DNS" error.

  CreateEcrApiEndpoint:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Create the local ecr.api endpoint (false if centralized). Only applies when CreateSupportingEndpoints=true.

  CreateEcrDkrEndpoint:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Create the local ecr.dkr endpoint (false if centralized). Only applies when CreateSupportingEndpoints=true.

  CreateLogsEndpoint:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Create the local logs endpoint (false if centralized). Only applies when CreateSupportingEndpoints=true.

  CreateSecretsManagerEndpoint:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Create the local secretsmanager endpoint (false if centralized). Only applies when CreateSupportingEndpoints=true.

  CreateEcsEndpoint:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Create the local ecs endpoint (false if centralized). Only applies when CreateSupportingEndpoints=true.

  PrivateRouteTableIds:
    Type: CommaDelimitedList
    Default: ''
    Description: >-
      Route table IDs of the private subnets. When set, creates a free S3
      gateway endpoint - worthwhile in every VPC (ECR image layers are
      served from S3, so this keeps pulls off NAT data-processing charges),
      and required for pulls to work at all when there is no NAT. Leave
      empty to skip.

  CertExpiryAlarmDays:
    Type: Number
    Default: 30
    MinValue: 1
    Description: >-
      Alarm when the imported certificate has this many days (or fewer)
      left. Imported ACM certs do NOT auto-renew - this alarm is the
      renewal reminder.

  AlarmSnsTopicArn:
    Type: String
    Default: ''
    Description: >-
      Optional SNS topic ARN to notify when the certificate-expiry alarm
      fires. Leave empty to create the alarm without a notification action
      (still visible in the CloudWatch console).

  AlbLogRetentionDays:
    Type: Number
    Default: 90
    MinValue: 1
    Description: Days to keep ALB access logs in the logs bucket before expiry.

  HttpsProxyUrl:
    Type: String
    Default: ''
    Description: >-
      Optional egress proxy URL (e.g. http://proxy.corp.example.com:3128)
      injected as HTTP_PROXY/HTTPS_PROXY into the gateway task. Set it when
      the landing zone mandates a central proxy for internet egress (the
      Okta issuer). Leave empty when egress is via NAT - local or a Transit
      Gateway egress VPC. AWS API calls and the database stay direct via
      NO_PROXY (.amazonaws.com), so Bedrock still flows through the VPC
      endpoint either way.

  HttpsProxyPort:
    Type: String
    Default: ''
    AllowedPattern: '^[0-9]*$'
    Description: >-
      Port of HttpsProxyUrl. Task egress is scoped to tcp/443 plus this
      port, so a non-443 proxy needs it opened here (deploy-gateway.sh
      derives it from HTTPS_PROXY_URL automatically). Leave empty when no
      proxy, or when the proxy listens on 443.

  ObservabilityOtlpUrl:
    Type: String
    Default: ''
    Description: >-
      Optional OTLP endpoint the gateway forwards telemetry to (metrics from
      the gateway plus relayed client metrics, stamped with user.id /
      user.email / user.groups from the Okta JWT). Deploy
      03-observability.yaml first, then set this to its OtlpForwardUrl
      output (e.g. http://otel-collector.claude-gw.internal:4318). Empty
      disables telemetry forwarding.

  ForwardActivityLogs:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      Also forward the ACTIVITY LOG stream (bash commands, tool inputs,
      file paths per user - prompt content stays redacted). Highly
      sensitive; enable only where an AI-activity audit trail is required.
      Lands in a short CloudWatch window + S3 archive via the
      observability stack. No effect unless ObservabilityOtlpUrl is set.

  DbAdminLambdaImage:
    Type: String
    Description: >-
      ECR image URI built from docker/db-admin/ by
      scripts/build-and-push-dbadmin.sh. Runs the one-time bootstrap that
      creates the least-privilege application DB users (the gateway never
      connects as the RDS master user) and the alternating-users secret
      rotation, which also rolls the service so tasks pick up the new
      credential.

  AppSecretRotationDays:
    Type: Number
    Default: 90
    MinValue: 1
    Description: >-
      Rotation cadence for the application DB user secret. Alternating
      users: the previous credential stays valid until the NEXT rotation,
      so a rotation is never time-critical for running tasks.

  OpusModelId:
    Type: String
    Default: claude-opus-4-8
    Description: Opus model ID presented to Claude Code clients through the gateway.

  OpusBedrockModelId:
    Type: String
    Default: us-gov.anthropic.claude-opus-4-8
    Description: >-
      Bedrock model / inference-profile ID the gateway invokes for Opus.
      Default is the GovCloud geo inference profile for Claude Opus 4.8
      (us-gov-west-1 also supports in-region invocation via
      anthropic.claude-opus-4-8). Verify against the Bedrock console:
      aws bedrock list-inference-profiles --region us-gov-west-1.

  SonnetModelId:
    Type: String
    Default: claude-sonnet-4-5
    Description: Sonnet model ID presented to Claude Code clients through the gateway.

  SonnetBedrockModelId:
    Type: String
    Default: us-gov.anthropic.claude-sonnet-4-5-20250929-v1:0
    Description: >-
      Bedrock model / inference-profile ID the gateway invokes for Sonnet.
      Default is the GovCloud geo inference profile for Claude Sonnet 4.5 —
      the newest Sonnet available in GovCloud (Sonnet 4.6 and Sonnet 5 are
      not offered there); note older models keep the dated -v1:0 ID format.
      Verify against the Bedrock console.

# Fargate only accepts specific CPU/memory pairings; an invalid combo
# otherwise surfaces as an opaque task-definition error mid-deploy.
Rules:
  FargateMemoryForCpu512:
    RuleCondition: !Equals [!Ref TaskCpu, '512']
    Assertions:
      - Assert:
          Fn::Contains: [['1024', '2048', '3072', '4096'], !Ref TaskMemory]
        AssertDescription: With TaskCpu 512, TaskMemory must be 1024-4096 in 1024 steps.
  FargateMemoryForCpu1024:
    RuleCondition: !Equals [!Ref TaskCpu, '1024']
    Assertions:
      - Assert:
          Fn::Contains: [['2048', '3072', '4096', '5120', '6144', '7168', '8192'], !Ref TaskMemory]
        AssertDescription: With TaskCpu 1024, TaskMemory must be 2048-8192 in 1024 steps.
  FargateMemoryForCpu2048:
    RuleCondition: !Equals [!Ref TaskCpu, '2048']
    Assertions:
      - Assert:
          Fn::Contains: [['4096', '5120', '6144', '7168', '8192', '9216', '10240', '11264', '12288', '13312', '14336', '15360', '16384'], !Ref TaskMemory]
        AssertDescription: With TaskCpu 2048, TaskMemory must be 4096-16384 in 1024 steps.
  FargateMemoryForCpu4096:
    RuleCondition: !Equals [!Ref TaskCpu, '4096']
    Assertions:
      - Assert:
          Fn::Contains: [['8192', '9216', '10240', '11264', '12288', '13312', '14336', '15360', '16384', '17408', '18432', '19456', '20480', '21504', '22528', '23552', '24576', '25600', '26624', '27648', '28672', '29696', '30720'], !Ref TaskMemory]
        AssertDescription: With TaskCpu 4096, TaskMemory must be 8192-30720 in 1024 steps.

Conditions:
  WantBedrockEndpoint: !Equals [!Ref CreateBedrockEndpoint, 'true']
  WantBedrockPrivateDns: !Equals [!Ref BedrockPrivateDns, 'true']
  WantSupportingEndpoints: !Equals [!Ref CreateSupportingEndpoints, 'true']
  WantEcrApiEndpoint: !And [!Condition WantSupportingEndpoints, !Equals [!Ref CreateEcrApiEndpoint, 'true']]
  WantEcrDkrEndpoint: !And [!Condition WantSupportingEndpoints, !Equals [!Ref CreateEcrDkrEndpoint, 'true']]
  WantLogsEndpoint: !And [!Condition WantSupportingEndpoints, !Equals [!Ref CreateLogsEndpoint, 'true']]
  WantSecretsManagerEndpoint: !And [!Condition WantSupportingEndpoints, !Equals [!Ref CreateSecretsManagerEndpoint, 'true']]
  WantEcsEndpoint: !And [!Condition WantSupportingEndpoints, !Equals [!Ref CreateEcsEndpoint, 'true']]
  WantAnyInterfaceEndpoint: !Or [!Condition WantBedrockEndpoint, !Condition WantSupportingEndpoints]
  WantS3Endpoint: !Not [!Equals [!Join ['', !Ref PrivateRouteTableIds], '']]
  HaveAlarmTopic: !Not [!Equals [!Ref AlarmSnsTopicArn, '']]
  HaveProxy: !Not [!Equals [!Ref HttpsProxyUrl, '']]
  HaveProxyPort: !Not [!Equals [!Ref HttpsProxyPort, '']]
  HaveTelemetry: !Not [!Equals [!Ref ObservabilityOtlpUrl, '']]

# Regional accounts the LEGACY ELB access-log writer authenticates as
# (regions launched before Aug 2022, incl. GovCloud). See AlbLogsBucketPolicy.
Mappings:
  ElbAccount:
    us-gov-west-1: { Id: '048591011584' }
    us-gov-east-1: { Id: '190560391635' }
    us-east-1:     { Id: '127311923021' }
    us-east-2:     { Id: '033677994240' }
    us-west-1:     { Id: '027434742980' }
    us-west-2:     { Id: '797873946194' }

Resources:

  # ------------------------------------------------------------------ secrets
  # All encrypted with the CMK exported by 01-database.yaml (C1/SC-28).
  OktaClientSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${NamePrefix}/oidc-client-secret'
      Description: Okta OIDC client secret. Placeholder at creation - set the real value after deploy.
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
      SecretString: 'REPLACE-ME-run-aws-secretsmanager-put-secret-value'

  JwtSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${NamePrefix}/jwt-secret'
      Description: Gateway session-signing secret (rotate per the runbook - prepend new value, roll, remove old).
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true

  # Application DB credential (least privilege - AC-6). The DbBootstrap
  # custom resource writes the real value (username/password/host/...);
  # rotation alternates between gateway_app and gateway_app_clone. The RDS
  # master secret is break-glass only - no task ever injects it.
  DbAppUserSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${NamePrefix}/db-app-user'
      Description: >-
        Application DB user for the gateway (alternating-users rotation;
        managed by the db-admin Lambda - do not edit by hand).
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
      SecretString: '{"bootstrap": "pending"}'

  # ------------------------------------------------------------ load balancer
  # SG egress is scoped everywhere (SC-7): inline lists replace the default
  # allow-all; 127.0.0.1/32 is the CFN idiom for "nothing beyond the
  # explicit standalone rules". The ALB->tasks rule is standalone to break
  # the reference cycle with ServiceSecurityGroup's ingress; the tasks'
  # 5432 comes from the attached db-client SG (01-database.yaml), and
  # OTLP 4317-4318 to the collector is attached by 03-observability.yaml.
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${NamePrefix} - internal ALB (TLS from developer networks)'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref ClientIngressCidr
          Description: HTTPS from developer/VPN/ZPA-connector networks
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 127.0.0.1/32
          Description: no egress except explicit standalone rules
      Tags:
        - Key: Name
          Value: !Sub '${NamePrefix}-alb'

  AlbToServiceEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref AlbSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      DestinationSecurityGroupId: !Ref ServiceSecurityGroup
      Description: Forward/health-check to gateway tasks

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${NamePrefix} - gateway tasks'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref AlbSecurityGroup
          Description: TLS (ALB re-encrypt) from the ALB only
      SecurityGroupEgress:
        # Okta (public), ECR/S3/logs/Secrets Manager/Bedrock/AMP - all TLS,
        # whether via VPC endpoints, NAT, or TGW central egress. The
        # database (5432) rides the attached db-client SG from 01.
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS to Okta and AWS services
        - !If
          - HaveProxyPort
          - IpProtocol: tcp
            FromPort: !Ref HttpsProxyPort
            ToPort: !Ref HttpsProxyPort
            CidrIp: 0.0.0.0/0
            Description: Egress proxy port
          - !Ref 'AWS::NoValue'
      Tags:
        - Key: Name
          Value: !Sub '${NamePrefix}-svc'

  # ALB access logs land here. This bucket deliberately stays SSE-S3
  # (AES256): ELB access-log delivery does NOT support SSE-KMS - the one
  # store in the deployment that cannot use the CMK. Delivery is via the
  # regional ELB account, granted in the bucket policy below.
  AlbLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Id: expire-alb-logs
            Status: Enabled
            ExpirationInDays: !Ref AlbLogRetentionDays

  AlbLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AlbLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # BOTH delivery principals, deliberately. Test-run finding
          # (us-gov-west-1): with only the service principal granted, the
          # log-delivery test-write INTERMITTENTLY (then consistently) got
          # AccessDenied on a verified-correct policy - GovCloud's writer
          # still authenticates as the legacy regional ELB account. AWS's
          # current recommendation is the service principal, and either
          # writer may be used in a legacy region, so grant both and be
          # correct regardless of which one shows up. The legacy writer's
          # bucket-owner-full-control canned ACL is the one ACL that
          # BucketOwnerEnforced still accepts, so ACLs-disabled is safe here.
          # Resource scopes both to this account's log path.
          - Sid: AllowElbLogDeliveryServicePrincipal
            Effect: Allow
            Principal:
              Service: logdelivery.elasticloadbalancing.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${AlbLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/*'
          - Sid: AllowElbLogDeliveryLegacyAccount
            Effect: Allow
            Principal:
              AWS: !Sub
                - 'arn:${AWS::Partition}:iam::${ElbAccountId}:root'
                - ElbAccountId: !FindInMap [ElbAccount, !Ref 'AWS::Region', Id]
            Action: s3:PutObject
            Resource: !Sub '${AlbLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/*'

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${NamePrefix}-alb'
      Scheme: internal
      Type: application
      # IPv4-only is REQUIRED: dual-stack internal ALBs publish public-range
      # AAAA records, which fails Claude Code's /login private-network check.
      IpAddressType: ipv4
      Subnets: !Ref PrivateSubnetIds
      SecurityGroups:
        - !Ref AlbSecurityGroup
      # deletion_protection.enabled and access_logs.s3.* are DELIBERATELY not
      # set here - deploy-gateway.sh applies both right after the deploy:
      # - access logs at create time race S3 bucket-policy propagation (ELB's
      #   test-write intermittently gets AccessDenied on a policy that is
      #   correct but not yet live; CloudFormation does not retry it). The
      #   script enables them with retries once the policy has settled.
      # - deletion protection baked into the create means a FAILED create
      #   cannot roll back (rollback can't delete the ALB) and wedges the
      #   stack in DELETE_FAILED. Post-deploy, protection covers steady state
      #   while failed creates stay cleanly deletable.
      # ModifyLoadBalancerAttributes only touches the keys it is given, so a
      # later stack update to the attributes below does NOT reset the
      # script-managed keys.
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
        # Streaming inference: a turn can stay silent for minutes; the 60s
        # default idle timeout truncates the SSE stream mid-response.
        - Key: idle_timeout.timeout_seconds
          Value: !Ref AlbIdleTimeoutSeconds

  # No Name: the HTTP->HTTPS protocol change (and any future protocol
  # change) replaces the target group, and a fixed name would collide with
  # itself mid-update. HTTPS to the target = the ALB re-encrypts; target
  # certs are not validated by ALBs, so the per-task self-signed cert works.
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VpcId
      Protocol: HTTPS
      Port: 8080
      TargetType: ip
      # Explicit: ALB health checks default to HTTP regardless of the
      # target-group protocol - without this the probe hits the TLS
      # listener in plaintext and no target ever goes healthy.
      HealthCheckProtocol: HTTPS
      # /healthz (liveness) keeps signed-in developers working through a
      # Postgres outage; use /readyz instead to pull replicas when the store is down.
      HealthCheckPath: /healthz
      HealthCheckIntervalSeconds: 15
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetGroupAttributes:
        # See the DeregistrationDelaySeconds parameter for the drain/deploy
        # trade-off (streams older than the delay are still cut on deploys).
        - Key: deregistration_delay.timeout_seconds
          Value: !Ref DeregistrationDelaySeconds

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Protocol: HTTPS
      Port: 443
      SslPolicy: !Ref TlsSecurityPolicy
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ------------------------------------------------------------------ ECS
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${NamePrefix}-cluster'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${NamePrefix}'
      RetentionInDays: 365
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'

  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${NamePrefix}-execution'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
      Policies:
        - PolicyName: read-secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # App-scoped DB credential only - tasks never read the RDS
              # master secret (break-glass, humans only).
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref OktaClientSecret
                  - !Ref JwtSecret
                  - !Ref DbAppUserSecret
              # The secrets are CMK-encrypted; decrypt rides IAM (the key
              # policy delegates to IAM via the account-root statement).
              - Effect: Allow
                Action: kms:Decrypt
                Resource:
                  Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${NamePrefix}-task'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: bedrock-invoke-claude-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: InvokeClaudeModels
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                # Exactly the two configured models, not anthropic.* - the
                # inference profiles in-region, plus their underlying
                # foundation models (profile ID minus the 'us-gov.' geo
                # prefix). Foundation-model region stays * because geo
                # profiles fan out across us-gov regions at invocation.
                # Switching models is still a parameter-only change.
                Resource:
                  - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${OpusBedrockModelId}'
                  - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${SonnetBedrockModelId}'
                  - !Sub
                    - 'arn:${AWS::Partition}:bedrock:*::foundation-model/${Model}'
                    - Model: !Join ['', !Split ['us-gov.', !Ref OpusBedrockModelId]]
                  - !Sub
                    - 'arn:${AWS::Partition}:bedrock:*::foundation-model/${Model}'
                    - Model: !Join ['', !Split ['us-gov.', !Ref SonnetBedrockModelId]]

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${NamePrefix}-gateway'
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: gateway
          Image: !Ref ContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: gateway
          Environment:
            - Name: CLAUDE_CONFIG_DIR
              Value: /tmp/.claude
            - Name: CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC
              Value: '1'
            - Name: CLAUDE_GATEWAY_LOG_LEVEL
              Value: info
            # Egress proxy for public endpoints (Okta). NO_PROXY keeps AWS
            # API calls on the VPC endpoints (Bedrock private DNS resolves
            # under .amazonaws.com), the database direct, and the OTLP
            # forward to the Cloud Map name (otel-collector.<prefix>.internal)
            # off the proxy - the corporate proxy cannot resolve a private
            # namespace, so without .internal all telemetry silently dies.
            - !If
              - HaveProxy
              - Name: HTTP_PROXY
                Value: !Ref HttpsProxyUrl
              - !Ref 'AWS::NoValue'
            - !If
              - HaveProxy
              - Name: HTTPS_PROXY
                Value: !Ref HttpsProxyUrl
              - !Ref 'AWS::NoValue'
            - !If
              - HaveProxy
              - Name: NO_PROXY
                # Scoped to this stack's Cloud Map namespace, not bare
                # .internal - corporate *.internal zones may legitimately
                # need the proxy.
                Value: !Sub 'localhost,127.0.0.1,169.254.169.254,169.254.170.2,.amazonaws.com,.${NamePrefix}.internal'
              - !Ref 'AWS::NoValue'
            - Name: PGHOST
              Value:
                Fn::ImportValue: !Sub '${NamePrefix}-db-endpoint'
            - Name: PGPORT
              Value:
                Fn::ImportValue: !Sub '${NamePrefix}-db-port'
            - Name: PGDATABASE
              Value:
                Fn::ImportValue: !Sub '${NamePrefix}-db-name'
            # gateway.yaml, rendered by CloudFormation and decoded by the
            # container entrypoint. ${!VAR} below escapes CFN substitution so
            # the gateway's own ${ENV} expansion sees the literal placeholder.
            - Name: GATEWAY_CONFIG_B64
              Value:
                Fn::Base64: !Sub |
                  listen:
                    host: 0.0.0.0
                    port: 8080
                    public_url: https://${GatewayFqdn}
                    # Serve TLS on the task itself (SC-8) - the ALB
                    # re-encrypts to the target. Cert/key are generated
                    # per-task by the entrypoint at these paths.
                    tls:
                      cert: /etc/claude/tls/server.crt
                      key: /etc/claude/tls/server.key
                    trusted_proxies: ["${VpcCidr}"]

                  oidc:
                    issuer: ${OktaIssuer}
                    client_id: ${OktaClientId}
                    client_secret: ${!OIDC_CLIENT_SECRET}
                    allowed_email_domains: [${AllowedEmailDomains}]
                    # Okta org authorization server omits email/groups from the
                    # id_token; harmless when using a custom auth server.
                    userinfo_fallback: true
                    # Uncomment to receive Okta group claims for managed.policies:
                    # scopes: [openid, profile, email, offline_access, groups]

                  session:
                    jwt_secret: ${!GATEWAY_JWT_SECRET}
                    ttl_hours: ${SessionTtlHours}

                  store:
                    postgres_url: ${!GATEWAY_POSTGRES_URL}

                  upstreams:
                    - provider: bedrock
                      region: ${AWS::Region}
                      auth: {}   # ECS task role via the default credential chain

                  # GovCloud serves Claude through us-gov.* inference profiles.
                  # If the built-in catalog does not resolve them on your gateway
                  # version, disable it and map models explicitly. Developers see
                  # both entries in the Claude Code model picker; the mapping is
                  # parameterized (OpusModelId/SonnetModelId + Bedrock IDs).
                  # upstream_model is an OBJECT keyed by the upstream's name -
                  # the single bedrock upstream above has no `name:`, so it keys
                  # on its provider string, `bedrock`. A bare string fails schema
                  # validation ("Expected object, received string").
                  auto_include_builtin_models: false
                  models:
                    - id: ${OpusModelId}
                      upstream_model:
                        bedrock: ${OpusBedrockModelId}
                    - id: ${SonnetModelId}
                      upstream_model:
                        bedrock: ${SonnetBedrockModelId}

                  # Per-IdP-group guardrails and managed settings:
                  # managed:
                  #   policies:
                  #     - match: { groups: [claude-developers] }
                  #       availableModels: [claude-opus-4-8, claude-sonnet-4-5]
                  #       cli:
                  #         env: { DISABLE_UPDATES: "1" }
                  #         skipWebFetchPreflight: true
            # Telemetry forwarding, appended to gateway.yaml by the
            # entrypoint when set. The gateway also auto-pushes the OTLP
            # enable env vars to every connected client via /managed/settings.
            - !If
              - HaveTelemetry
              - Name: GATEWAY_TELEMETRY_B64
                Value:
                  Fn::Base64: !Sub
                    - |
                      telemetry:
                        forward_to:
                          - url: ${ObservabilityOtlpUrl}
                            metrics: true
                            logs: ${LogsFlag}
                    - LogsFlag: !Ref ForwardActivityLogs
              - !Ref 'AWS::NoValue'
          Secrets:
            - Name: OIDC_CLIENT_SECRET
              ValueFrom: !Ref OktaClientSecret
            - Name: GATEWAY_JWT_SECRET
              ValueFrom: !Ref JwtSecret
            # The APP user (created by DbBootstrap), never the master.
            - Name: PGUSER
              ValueFrom: !Sub '${DbAppUserSecret}:username::'
            - Name: PGPASSWORD
              ValueFrom: !Sub '${DbAppUserSecret}:password::'

  Service:
    Type: AWS::ECS::Service
    # DbBootstrap: tasks inject username/password keys from the app secret,
    # which only exist after the bootstrap has written the real value.
    DependsOn: [HttpsListener, DbBootstrap]
    Properties:
      ServiceName: !Sub '${NamePrefix}-gateway'
      Cluster: !Ref Cluster
      # Required for the default (rolling) deployment controller. !Ref on a
      # TaskDefinition returns its full ARN incl. revision, so each template
      # update that changes the task def rolls the service to the new revision.
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups:
            - !Ref ServiceSecurityGroup
            - Fn::ImportValue: !Sub '${NamePrefix}-db-client-sg'
      LoadBalancers:
        - ContainerName: gateway
          ContainerPort: 8080
          TargetGroupArn: !Ref TargetGroup

  # ----------------------------------------- app DB user (AC-6) + rotation
  # The gateway connects as gateway_app / gateway_app_clone - LOGIN roles
  # that assume a NOLOGIN owner role at login, so every object has one
  # owner regardless of which user ran the migration. They hold no
  # CREATEROLE / rds_superuser powers (a compromised gateway cannot mint
  # users or quiet pgaudit). The RDS master secret is break-glass only:
  # RDS keeps auto-rotating it weekly, and since no task injects it,
  # nothing goes stale.
  #
  # Rotation is a custom Lambda (same image as the bootstrap) using the
  # ALTERNATING-USERS strategy: each rotation flips the secret to the
  # other user with a fresh password, so the previous credential stays
  # valid until the NEXT rotation - and finishSecret force-rolls the
  # service so tasks re-fetch credentials. A failed roll fails the step;
  # Secrets Manager retries it (the label move is idempotent).
  DbAdminLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${NamePrefix}-db-admin'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole'
      Policies:
        - PolicyName: db-admin
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadMasterSecret
                Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  Fn::ImportValue: !Sub '${NamePrefix}-db-secret-arn'
              - Sid: ManageAppSecret
                Effect: Allow
                Action:
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:UpdateSecretVersionStage
                Resource: !Ref DbAppUserSecret
              - Sid: RandomPassword
                Effect: Allow
                Action: secretsmanager:GetRandomPassword
                Resource: '*'
              - Sid: CmkForSecrets
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource:
                  Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
              - Sid: RollGatewayService
                Effect: Allow
                Action: ecs:UpdateService
                Resource: !Sub 'arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:service/${Cluster}/${NamePrefix}-gateway'

  DbBootstrapFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${NamePrefix}-db-bootstrap'
      Description: One-time creation of the least-privilege application DB users.
      PackageType: Image
      Code:
        ImageUri: !Ref DbAdminLambdaImage
      ImageConfig:
        Command: [app.bootstrap_handler]
      Timeout: 120
      MemorySize: 256
      Role: !GetAtt DbAdminLambdaRole.Arn
      VpcConfig:
        SubnetIds: !Ref PrivateSubnetIds
        SecurityGroupIds:
          - !Ref DbAdminLambdaSecurityGroup
          - Fn::ImportValue: !Sub '${NamePrefix}-db-client-sg'
      Environment:
        Variables:
          MASTER_SECRET_ARN:
            Fn::ImportValue: !Sub '${NamePrefix}-db-secret-arn'
          APP_SECRET_ARN: !Ref DbAppUserSecret
          PGHOST:
            Fn::ImportValue: !Sub '${NamePrefix}-db-endpoint'
          PGPORT:
            Fn::ImportValue: !Sub '${NamePrefix}-db-port'
          PGDATABASE:
            Fn::ImportValue: !Sub '${NamePrefix}-db-name'

  DbBootstrap:
    Type: Custom::DbAppUserBootstrap
    Properties:
      ServiceToken: !GetAtt DbBootstrapFunction.Arn
      # Fail the stack in minutes, not the ~1-hour default, if the bootstrap
      # Lambda never responds (e.g. it can't start, or hangs with no DB
      # route). Comfortably above a normal run (VPC cold start + a few SQL
      # statements, ~tens of seconds) and the Lambda's own 120s timeout.
      ServiceTimeout: 300
      # Bump to force a re-run (idempotent: converges roles/grants, never
      # resets live passwords).
      ConfigVersion: '1'

  DbRotationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${NamePrefix}-db-rotation'
      Description: Alternating-users rotation for the app DB secret; rolls the gateway service.
      PackageType: Image
      Code:
        ImageUri: !Ref DbAdminLambdaImage
      ImageConfig:
        Command: [app.rotate_handler]
      Timeout: 120
      MemorySize: 256
      Role: !GetAtt DbAdminLambdaRole.Arn
      VpcConfig:
        SubnetIds: !Ref PrivateSubnetIds
        SecurityGroupIds:
          - !Ref DbAdminLambdaSecurityGroup
          - Fn::ImportValue: !Sub '${NamePrefix}-db-client-sg'
      Environment:
        Variables:
          MASTER_SECRET_ARN:
            Fn::ImportValue: !Sub '${NamePrefix}-db-secret-arn'
          APP_SECRET_ARN: !Ref DbAppUserSecret
          PGHOST:
            Fn::ImportValue: !Sub '${NamePrefix}-db-endpoint'
          PGPORT:
            Fn::ImportValue: !Sub '${NamePrefix}-db-port'
          PGDATABASE:
            Fn::ImportValue: !Sub '${NamePrefix}-db-name'
          ECS_CLUSTER: !Ref Cluster
          ECS_SERVICE: !GetAtt Service.Name

  DbRotationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DbRotationFunction
      Action: lambda:InvokeFunction
      Principal: secretsmanager.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  DbAppSecretRotation:
    Type: AWS::SecretsManager::RotationSchedule
    # Service (and therefore DbBootstrap) must exist: schedule creation
    # triggers an immediate first rotation, which flips to the clone user
    # and rolls the service. Rotation is ASYNCHRONOUS - the stack goes
    # green regardless of the first rotation's outcome, so check the
    # db-rotation log group (or the alarm below) after first deploy. At a
    # 90-day cadence the image Lambda will be Inactive when each rotation
    # fires; the first invoke fails while Lambda re-optimizes the image
    # and Secrets Manager's own retries then complete the rotation.
    DependsOn: [Service, DbRotationInvokePermission]
    Properties:
      SecretId: !Ref DbAppUserSecret
      RotationLambdaARN: !GetAtt DbRotationFunction.Arn
      RotateImmediatelyOnUpdate: true
      RotationRules:
        ScheduleExpression: !Sub 'rate(${AppSecretRotationDays} days)'

  # -------------------------------------------------- optional VPC endpoints
  # The db-admin Lambda (bootstrap + rotation) lives in the VPC to reach
  # Postgres; it also calls Secrets Manager and ECS (via the endpoints in
  # a no-NAT spoke, or NAT otherwise).
  DbAdminLambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${NamePrefix} - db-admin Lambda (bootstrap + rotation)'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Secrets Manager + ECS APIs
      Tags:
        - Key: Name
          Value: !Sub '${NamePrefix}-db-admin'

  EndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: WantAnyInterfaceEndpoint
    Properties:
      GroupDescription: !Sub '${NamePrefix} - interface VPC endpoints'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref ServiceSecurityGroup
          Description: TLS from gateway tasks
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref DbAdminLambdaSecurityGroup
          Description: TLS from the db-admin Lambda
      # Endpoint ENIs never initiate connections.
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 127.0.0.1/32
          Description: no egress

  BedrockRuntimeEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: WantBedrockEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.bedrock-runtime'
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: !If [WantBedrockPrivateDns, true, false]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ClaudeOnlyThroughThisEndpoint
            Effect: Allow
            Principal: '*'
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
            # Mirrors the task-role scoping: the two configured models only.
            Resource:
              - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${OpusBedrockModelId}'
              - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${SonnetBedrockModelId}'
              - !Sub
                - 'arn:${AWS::Partition}:bedrock:*::foundation-model/${Model}'
                - Model: !Join ['', !Split ['us-gov.', !Ref OpusBedrockModelId]]
              - !Sub
                - 'arn:${AWS::Partition}:bedrock:*::foundation-model/${Model}'
                - Model: !Join ['', !Split ['us-gov.', !Ref SonnetBedrockModelId]]

  # Endpoints Fargate itself depends on when the private subnets have no NAT:
  # image pull (ecr.api + ecr.dkr + S3 for layer blobs), awslogs (logs), and
  # task secret injection (secretsmanager). RDS needs no endpoint - the DB is
  # in-VPC. Okta remains an external HTTPS dependency no endpoint can cover.
  # Every endpoint carries a policy (SC-7 defense-in-depth): the network
  # path enforces "this account's resources only" even if an IAM policy is
  # ever over-broadened.
  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: WantEcrApiEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.api'
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: true
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AuthTokenHasNoResource
            Effect: Allow
            Principal: '*'
            Action: ecr:GetAuthorizationToken
            Resource: '*'
          - Sid: ThisAccountRepositoriesOnly
            Effect: Allow
            Principal: '*'
            Action:
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
            Resource: !Sub 'arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/*'

  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: WantEcrDkrEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.dkr'
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: true
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AuthTokenHasNoResource
            Effect: Allow
            Principal: '*'
            Action: ecr:GetAuthorizationToken
            Resource: '*'
          - Sid: ThisAccountRepositoriesOnly
            Effect: Allow
            Principal: '*'
            Action:
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
            Resource: !Sub 'arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/*'

  LogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: WantLogsEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.logs'
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: true
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ThisAccountLogGroupsOnly
            Effect: Allow
            Principal: '*'
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogStreams
              - logs:PutRetentionPolicy
            Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*'

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: WantSecretsManagerEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.secretsmanager'
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: true
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: GatewaySecretsOnly
            Effect: Allow
            Principal: '*'
            # Tasks read; the db-admin Lambda also describes, writes, and
            # re-stages during rotation. Scoped to this stack's named
            # secrets plus the RDS-managed master secret (random rds! name).
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
              - secretsmanager:PutSecretValue
              - secretsmanager:UpdateSecretVersionStage
            Resource:
              - !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${NamePrefix}/*'
              - !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:rds!*'
          - Sid: RandomPasswordHasNoResource
            Effect: Allow
            Principal: '*'
            Action: secretsmanager:GetRandomPassword
            Resource: '*'

  # ECS control-plane API - needed by the db-admin rotation Lambda's
  # UpdateService call from inside a no-NAT spoke (Fargate tasks themselves
  # do not need it on platform 1.4). Deliberately NO PolicyDocument: not
  # every GovCloud endpoint supports policies and an unsupported one fails
  # the whole stack; the equivalent scoping already lives on
  # DbAdminLambdaRole (ecs:UpdateService on the one service ARN).
  EcsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: WantEcsEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecs'
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: true

  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: WantS3Endpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Gateway
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      RouteTableIds: !Ref PrivateRouteTableIds
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # ECR serves image layers from this AWS-owned regional bucket -
          # without it, pulls fail with a misleading auth error.
          - Sid: EcrLayerBucket
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::prod-${AWS::Region}-starport-layer-bucket/*'
          # CloudFormation custom resources respond via a presigned PUT to
          # an AWS-owned bucket; the gateway-endpoint route captures that
          # traffic, and blocking it hangs every DbBootstrap create/delete
          # for ~an hour.
          - Sid: CfnCustomResourceResponses
            Effect: Allow
            Principal: '*'
            Action: s3:PutObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::cloudformation-custom-resource-response-*/*'
          - Sid: ThisAccountBucketsOnly
            Effect: Allow
            Principal: '*'
            Action: 's3:*'
            Resource: '*'
            Condition:
              StringEquals:
                aws:ResourceAccount: !Ref AWS::AccountId

  # Rotation failures are otherwise silent (rotation is asynchronous and
  # retried; nothing else surfaces a permanently failing rotation). The
  # threshold tolerates the expected single Inactive-state error per
  # scheduled rotation (see DbAppSecretRotation comment).
  DbRotationFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${NamePrefix}-db-rotation-errors'
      AlarmDescription: >-
        The app DB secret rotation Lambda is erroring repeatedly. Check
        its log group; if rotation stays wedged, tasks keep working on the
        current credential but the rotation SLA is not being met.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref DbRotationFunction
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HaveAlarmTopic, [!Ref AlarmSnsTopicArn], !Ref 'AWS::NoValue']

  # ------------------------------------------------------------------ alarms
  # Imported ACM certificates do NOT auto-renew; ACM publishes DaysToExpiry
  # daily for every certificate. This alarm is the renewal reminder.
  CertificateExpiryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${NamePrefix}-certificate-expiry'
      AlarmDescription: !Sub >-
        The ${NamePrefix} gateway certificate expires in
        ${CertExpiryAlarmDays} days or fewer. Imported ACM certificates do
        not auto-renew: re-issue with the enterprise CA, publish the new
        SHA-256 fingerprint to developers, then re-run
        import-enterprise-cert.sh import --certificate-arn to replace
        in place.
      Namespace: AWS/CertificateManager
      MetricName: DaysToExpiry
      Dimensions:
        - Name: CertificateArn
          Value: !Ref CertificateArn
      Statistic: Minimum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: !Ref CertExpiryAlarmDays
      ComparisonOperator: LessThanOrEqualToThreshold
      TreatMissingData: ignore
      AlarmActions: !If [HaveAlarmTopic, [!Ref AlarmSnsTopicArn], !Ref 'AWS::NoValue']

Outputs:
  AlbDnsName:
    Description: >-
      CNAME target. Create in corporate DNS:
      <GatewayFqdn>  CNAME  <this value>  - then bypass that FQDN in Zscaler
      (ZIA SSL-inspection exemption, or ZPA app segment for the FQDN).
    Value: !GetAtt LoadBalancer.DNSName
  LoadBalancerArn:
    Description: Used by deploy-gateway.sh to apply deletion protection + access logs post-deploy.
    Value: !Ref LoadBalancer
  GatewayUrl:
    Description: Value for forceLoginGatewayUrl in managed-settings.json and the Okta redirect host.
    Value: !Sub 'https://${GatewayFqdn}'
  OktaRedirectUri:
    Value: !Sub 'https://${GatewayFqdn}/oauth/callback'
  OktaClientSecretArn:
    Description: 'Set the real secret: aws secretsmanager put-secret-value --secret-id <arn> --secret-string <value>'
    Value: !Ref OktaClientSecret
  ClusterName:
    Value: !Ref Cluster
  ServiceName:
    Value: !Sub '${NamePrefix}-gateway'
  AlbLogsBucketName:
    Description: S3 bucket receiving ALB access logs (expires per AlbLogRetentionDays).
    Value: !Ref AlbLogsBucket
  # Cross-stack exports for 03-observability.yaml
  ServiceSecurityGroupId:
    Description: Gateway task SG - the collector allows OTLP ingress from it.
    Value: !Ref ServiceSecurityGroup
    Export:
      Name: !Sub '${NamePrefix}-svc-sg'
  AlbSecurityGroupId:
    Description: ALB SG - Grafana allows ingress from it.
    Value: !Ref AlbSecurityGroup
    Export:
      Name: !Sub '${NamePrefix}-alb-sg'
  HttpsListenerArn:
    Description: HTTPS listener - the observability stack attaches the /grafana rule to it.
    Value: !Ref HttpsListener
    Export:
      Name: !Sub '${NamePrefix}-https-listener'
  ClusterArnExport:
    Description: ECS cluster shared with the observability services.
    Value: !GetAtt Cluster.Arn
    Export:
      Name: !Sub '${NamePrefix}-cluster-arn'
  # Only when the shared Fargate interface endpoints exist (their private DNS
  # forces VPC-wide traffic onto them). 03 imports this to add collector /
  # Grafana ingress so those tasks can reach ecr/logs/secretsmanager; without
  # it their 443 is dropped and 03 never reaches steady state. The SG itself
  # exists under WantAnyInterfaceEndpoint, a superset of WantSupportingEndpoints.
  EndpointSecurityGroupId:
    Condition: WantSupportingEndpoints
    Description: Shared interface-endpoint SG; 03 adds observability-task ingress to it.
    Value: !Ref EndpointSecurityGroup
    Export:
      Name: !Sub '${NamePrefix}-endpoint-sg'
