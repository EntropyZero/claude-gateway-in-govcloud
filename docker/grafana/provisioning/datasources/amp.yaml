apiVersion: 1

datasources:
  - name: AMP
    uid: amp
    type: prometheus
    access: proxy
    isDefault: true
    # Interpolated from the container environment (set in the task definition).
    url: $AMP_QUERY_URL
    jsonData:
      httpMethod: POST
      sigV4Auth: true
      sigV4AuthType: default
      sigV4Region: $AMP_REGION
