<text x="48" y="650" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" font-weight="normal" text-anchor="start" >TLS termination points: developer→ALB terminates on the enterprise cert (developers pin its fingerprint); ALB→task hops terminate on per-task ephemeral certs (ALBs do not validate target certs; keys never leave the task).</text>
<text x="48" y="670" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#64748B" font-weight="normal" text-anchor="start" >All AWS-service hops (5, 7, 8) also carry SigV4 request signing on top of TLS. DNS to the VPC resolver is exempt from security-group evaluation (AWS platform behavior).</text>
