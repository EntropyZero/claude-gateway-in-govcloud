<text x="756" y="423" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#B91C1C" font-weight="normal" text-anchor="start" >FORWARD_ACTIVITY_LOGS=true · bash commands, tool inputs, file paths per user</text>
