<text x="1055.0" y="831" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#64748B" font-weight="normal" text-anchor="middle" >force new deployment — tasks re-fetch</text>
<text x="36" y="862" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" font-weight="normal" text-anchor="start" >Why alternating users: the PREVIOUS credential stays valid until the NEXT rotation, so running tasks never hold a dead password — the roll is never time-critical.</text>
<text x="36" y="882" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" font-weight="normal" text-anchor="start" >Failure handling: Secrets Manager retries any failed step; a persistently failing rotation trips the &lt;prefix&gt;-db-rotation-errors CloudWatch alarm.</text>
<text x="36" y="910" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#334155" font-weight="normal" text-anchor="start" >Roles: gw (master, break-glass, RDS-rotated weekly) · gateway_owner (NOLOGIN, owns schema) · gateway_app / gateway_app_clone (LOGIN, SET role → owner; no CREATEROLE, no rds_superuser, cannot touch pgaudit).</text>
