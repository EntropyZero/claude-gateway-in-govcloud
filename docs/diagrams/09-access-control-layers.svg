<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="700" viewBox="0 0 1560 700">
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/></marker></defs>
<rect x="0.5" y="0.5" width="1559" height="699" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
<text x="36" y="46" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#0F172A" font-weight="bold" text-anchor="start" >9. Layered access control - what each layer stops</text>
<text x="36" y="68" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start" >One request traced through every gate: a gateway task reading its DB secret through the Secrets Manager endpoint.</text>
<rect x="50" y="150" width="170" height="90" rx="8" fill="#FFFFFF" stroke="#047857" stroke-width="1.4"/>
<text x="135.0" y="171" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#0F172A" font-weight="bold" text-anchor="middle" >Gateway task</text>
<text x="135.0" y="187" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#64748B" font-weight="normal" text-anchor="middle" >wants its</text>
<text x="135.0" y="201" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#64748B" font-weight="normal" text-anchor="middle" >db-app secret</text>
<rect x="250" y="128" width="200" height="134" rx="8" fill="#FFFFFF" stroke="#047857" stroke-width="1.4"/>
<text x="350.0" y="149" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#0F172A" font-weight="bold" text-anchor="middle" >1. Source SG egress</text>
<text x="350" y="172" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#334155" font-weight="normal" text-anchor="middle" >svc allows 443 out</text>
<path d="M220 195 L250 195" fill="none" stroke="#047857" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="480" y="128" width="200" height="134" rx="8" fill="#FFFFFF" stroke="#047857" stroke-width="1.4"/>
<text x="580.0" y="149" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#0F172A" font-weight="bold" text-anchor="middle" >2. Endpoint SG ingress</text>
<text x="580" y="172" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#334155" font-weight="normal" text-anchor="middle" >only the named SGs</text>
<text x="580" y="187" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#334155" font-weight="normal" text-anchor="middle" >(svc, db-admin, ...)</text>
<path d="M420 195 L480 195" fill="none" stroke="#047857" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="710" y="128" width="200" height="134" rx="8" fill="#FFFFFF" stroke="#6D28D9" stroke-width="1.4"/>
<text x="810.0" y="149" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#0F172A" font-weight="bold" text-anchor="middle" >3. Endpoint policy</text>
<text x="810" y="172" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#334155" font-weight="normal" text-anchor="middle" >only THIS account's</text>
<text x="810" y="187" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#334155" font-weight="normal" text-anchor="middle" >secret ARNs</text>
<path d="M650 195 L710 195" fill="none" stroke="#047857" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="940" y="128" width="200" height="134" rx="8" fill="#FFFFFF" stroke="#6D28D9" stroke-width="1.4"/>
<text x="1040.0" y="149" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#0F172A" font-weight="bold" text-anchor="middle" >4. IAM (execution role)</text>
<text x="1040" y="172" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#334155" font-weight="normal" text-anchor="middle" >only this task's own</text>
<text x="1040" y="187" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#334155" font-weight="normal" text-anchor="middle" >secret ARNs</text>
<path d="M880 195 L940 195" fill="none" stroke="#047857" stroke-width="1.6" marker-end="url(#arr)"/>
<rect x="1170" y="128" width="200" height="134" rx="8" fill="#FFFFFF" stroke="#6D28D9" stroke-width="1.4"/>
<text x="1270.0" y="149" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#0F172A" font-weight="bold" text-anchor="middle" >5. KMS key policy</text>
<text x="1270" y="172" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#334155" font-weight="normal" text-anchor="middle" >decrypt via the CMK,</text>
<text x="1270" y="187" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#334155" font-weight="normal" text-anchor="middle" >grantees only</text>
<path d="M1110 195 L1170 195" fill="none" stroke="#047857" stroke-width="1.6" marker-end="url(#arr)"/>
<path d="M1370 195 L1510 195" fill="none" stroke="#047857" stroke-width="1.6" marker-end="url(#arr)"/>
<path d="M1385 159 a 62.5 9 0 0 1 125 0 v 72 a 62.5 9 0 0 1 -125 0 Z" fill="#FFFFFF" stroke="#047857" stroke-width="1.4"/>
<path d="M1385 159 a 62.5 9 0 0 0 125 0" fill="none" stroke="#047857" stroke-width="1.4"/>
<text x="1447.5" y="181" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#0F172A" font-weight="bold" text-anchor="middle" >Secret</text>
<text x="1447.5" y="197" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#64748B" font-weight="normal" text-anchor="middle" >decrypted</text>
<text x="1447.5" y="211" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#64748B" font-weight="normal" text-anchor="middle" >value</text>
<text x="50" y="320" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#0F172A" font-weight="bold" text-anchor="start" >Why the layers are not redundant - each stops a different failure:</text>
<text x="66" y="348" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#B91C1C" font-weight="bold" text-anchor="start" >- Compromised box in another subnet, ANY credentials</text>
<text x="84" y="365" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >stopped at layer 2 - its SG is not in the endpoint SG ingress (network path denied before authn)</text>
<text x="66" y="396" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#B91C1C" font-weight="bold" text-anchor="start" >- Compromised workload using ATTACKER-OWNED AWS credentials (exfiltration through the private endpoint)</text>
<text x="84" y="413" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >stopped at layer 3 - the endpoint policy allows only this account's resources; your IAM cannot judge foreign principals</text>
<text x="66" y="444" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#B91C1C" font-weight="bold" text-anchor="start" >- Legitimate workload asking for a secret it does not own</text>
<text x="84" y="461" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >stopped at layer 4 - execution roles enumerate exact ARNs (gateway task cannot read the master secret: no task injects it)</text>
<text x="66" y="492" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#B91C1C" font-weight="bold" text-anchor="start" >- Principal with a stolen ciphertext or over-broad S3/API access</text>
<text x="84" y="509" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#334155" font-weight="normal" text-anchor="start" >stopped at layer 5 - the CMK key policy grants decrypt only to the roles that need it</text>
<rect x="50" y="552" width="1460" height="104" rx="8" fill="#FFFFFF" stroke="#6D28D9" stroke-width="1.4"/>
<text x="780.0" y="573" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#0F172A" font-weight="bold" text-anchor="middle" >Non-SG enforcement points elsewhere in the deployment</text>
<text x="70" y="586" font-family="Helvetica, Arial, sans-serif" font-size="10.8" fill="#334155" font-weight="normal" text-anchor="start" >bedrock-runtime endpoint policy: pinned to the TWO configured model IDs + their inference profiles (not anthropic.*)   |   ecs endpoint: NO policy (GovCloud unsupported) - IAM-side scoping covers it</text>
<text x="70" y="604" font-family="Helvetica, Arial, sans-serif" font-size="10.8" fill="#334155" font-weight="normal" text-anchor="start" >S3 gateway endpoint policy: ECR layer bucket + CloudFormation custom-resource response buckets + this account's buckets only</text>
<text x="70" y="622" font-family="Helvetica, Arial, sans-serif" font-size="10.8" fill="#334155" font-weight="normal" text-anchor="start" >ALB access-log bucket policy: exactly two writers (ELB log-delivery service principal + legacy regional ELB account)   |   AMP endpoint policy: this workspace's ARN only</text>
<text x="70" y="640" font-family="Helvetica, Arial, sans-serif" font-size="10.8" fill="#334155" font-weight="normal" text-anchor="start" >Okta egress: Zscaler policy must ALLOW + not inspect the issuer FQDN for server-originated traffic (org prerequisite - see the networking request)</text>
</svg>
