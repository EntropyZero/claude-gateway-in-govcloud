AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Claude apps gateway on ECS Fargate behind an internal IPv4-only ALB
  (AWS GovCloud). TLS terminates at the ALB with a certificate signed by
  your enterprise CA (imported into ACM; pass its ARN) and is re-encrypted
  to the tasks (per-task self-signed certs - SC-8 on the internal hop).
  Developers reach the gateway via a corporate-DNS CNAME that points at
  the ALB's default DNS name. Deploy 01-database.yaml first with the same
  NamePrefix.

# W1030 false positive: the telemetry task-role policy is gated on
# HaveTelemetry, but cfn-lint evaluates the true branch with
# ObservabilityAmpWorkspaceArn's empty default resolved into an IAM Resource
# ARN field - it can't know the operator always sets the ARN when telemetry is
# on. Every real ARN in this template is !Sub-constructed (always well-formed),
# so scoping the ignore here masks only that one false positive.
Metadata:
  cfn-lint:
    config:
      ignore_checks: [W1030]

Parameters:
  NamePrefix:
    Type: String
    Default: claude-gw
    Description: Must match the NamePrefix used by 01-database.yaml (cross-stack imports).
    AllowedPattern: '[a-z][a-z0-9-]{1,20}'

  VpcId:
    Type: AWS::EC2::VPC::Id

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: VPC CIDR - used for listen.trusted_proxies so the gateway reads real client IPs from X-Forwarded-For.
    AllowedPattern: '^\d+\.\d+\.\d+\.\d+/\d+$'

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for the ALB and the Fargate tasks (>= 2 AZs).

  ClientIngressCidr:
    Type: String
    Default: 10.0.0.0/8
    AllowedPattern: '^\d+\.\d+\.\d+\.\d+/\d+$'
    Description: >-
      CIDR allowed to reach the ALB on 443 - VPN client pool and/or the
      subnets where your Zscaler ZPA App Connectors run. Add further
      AWS::EC2::SecurityGroupIngress resources for additional ranges.

  CertificateArn:
    Type: String
    Description: >-
      ACM ARN of the enterprise-CA-signed certificate whose SAN is the
      corporate CNAME (import first with scripts/import-enterprise-cert.sh).
    AllowedPattern: '^arn:aws[a-z-]*:acm:.+'

  TlsSecurityPolicy:
    Type: String
    Default: ELBSecurityPolicy-TLS13-1-2-FIPS-2023-04
    Description: FIPS policy by default; use ELBSecurityPolicy-TLS13-1-2-2021-06 if FIPS endpoints are not mandated.

  GatewayFqdn:
    Type: String
    Description: >-
      The corporate-DNS CNAME developers use (e.g. claude-gateway.example.com).
      Becomes listen.public_url and the Okta redirect_uri host. The CNAME
      record itself is created in your corporate DNS, pointing at this
      stack's AlbDnsName output.
    AllowedPattern: '^[a-z0-9.-]+\.[a-z]{2,}$'

  ContainerImage:
    Type: String
    Description: 'ECR image URI built from docker/ (e.g. <acct>.dkr.ecr.us-gov-west-1.amazonaws.com/claude-gateway:2.1.207).'

  DesiredCount:
    Type: Number
    Default: 2
    MinValue: 1

  TaskCpu:
    Type: String
    Default: '1024'
    AllowedValues: ['512', '1024', '2048', '4096']
    Description: >-
      Task-level CPU units. When telemetry is enabled this value covers BOTH
      the gateway and the co-resident ADOT collector sidecar - the collector
      needs roughly 128-256 CPU / 512MB of headroom, which the default
      1024/2048 pairing comfortably absorbs.

  TaskMemory:
    Type: String
    Default: '2048'

  OktaIssuer:
    Type: String
    # Identical to 03-observability.yaml's OktaIssuer pattern: the SAME
    # OKTA_ISSUER feeds both stacks, so a value that passes here must pass
    # there. Requires https://, allows the bare org domain or a custom
    # /oauth2/<id> server, and rejects a trailing slash - which would both
    # break the gateway's OIDC discovery (issuer mismatch) and give Grafana's
    # derived <issuer>/oauth2/v1/... URLs a double slash.
    AllowedPattern: '^https://[a-zA-Z0-9.-]+(/oauth2/[a-zA-Z0-9._-]+)?$'
    ConstraintDescription: >-
      Must be an https Okta issuer with NO trailing slash. A scheme-less or
      non-https value crash-loops the gateway ("oidc.issuer must be an http(s)
      URL"). Org server: https://your-org.okta.com. Custom server:
      https://your-org.okta.com/oauth2/<id>. Set OktaAuthServerType to match.
    Description: >-
      Okta issuer URL - INCLUDE the https:// scheme (a bare domain crash-loops
      the task). Reused verbatim for Grafana SSO in 03. A custom authorization
      server is recommended (https://your-org.okta.com/oauth2/default); the org
      server (https://your-org.okta.com) also works because userinfo_fallback
      is enabled.

  OktaClientId:
    Type: String
    Description: Client ID of the OIDC web app registered in Okta (redirect_uri = https://<GatewayFqdn>/oauth/callback).

  AllowedEmailDomains:
    Type: String
    Description: 'Comma-separated email domains accepted at sign-in (e.g.: example.com, example.gov).'

  SpendGroupLimitMode:
    Type: String
    Default: min
    AllowedValues: [min, max]
    Description: >-
      How multiple matching per-group spend caps combine for one user. `min`
      (default) takes the MOST RESTRICTIVE cap, so adding a user to a group can
      only ever tighten their limit. `max` takes the most permissive, so a
      higher-tier group raises the cap. Per-user caps always win over group caps.

  SpendBlockedMessage:
    Type: String
    Default: 'Contact the Claude Code platform team to request an increase.'
    AllowedPattern: "[^']*"
    MaxLength: 200
    Description: >-
      Org-specific text appended to the 429 a developer sees when a spend cap is
      hit ("spend limit reached - <this>"). Single quotes are not allowed (the
      value is rendered into a single-quoted YAML scalar).

  SessionTtlHours:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 24

  AlbIdleTimeoutSeconds:
    Type: Number
    Default: 900
    MinValue: 60
    MaxValue: 4000
    Description: >-
      ALB idle timeout. Must comfortably exceed the longest silent gap in a
      streaming inference response - an extended-thinking turn can go minutes
      with no bytes on the wire, and the 60s ALB default truncates the stream
      mid-response. Keep >= 300; 900 is a safe ceiling for long turns.

  DeregistrationDelaySeconds:
    Type: Number
    Default: 300
    MinValue: 0
    MaxValue: 3600
    Description: >-
      Target-group drain time on every rolling deploy (config changes roll
      the service). Trade-off: streams still open when a deploy starts are
      cut after THIS long (not AlbIdleTimeoutSeconds), and the ALB always
      waits the FULL delay before ECS stops the old task - so every deploy
      takes this much longer per task wave. 300 protects most turns at +5
      min per deploy; raise toward the idle timeout only if cut long turns
      during deploys are unacceptable.

  CreateBedrockEndpoint:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Create a bedrock-runtime interface VPC endpoint so inference needs no NAT/IGW path.

  BedrockPrivateDns:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >-
      Private DNS on the bedrock-runtime endpoint. Set false when a
      centralized (shared-services) bedrock-runtime endpoint already
      associates a private hosted zone with this VPC - creating a second
      PrivateDnsEnabled endpoint for the same service fails the stack. Note
      that with false, traffic follows the shared PHZ to the CENTRAL
      endpoint, so apply the Claude-only endpoint policy there (see README
      "VPC endpoints").

  AdminClientSecurityGroupId:
    Type: String
    Default: ''
    AllowedPattern: '(sg-[0-9a-f]+)?'
    ConstraintDescription: A security group ID (sg-...) or empty.
    Description: >-
      Optional. SG of an in-VPC operator/build host (the machine running the
      deploy scripts). Interface endpoints with private DNS capture AWS API
      calls from EVERY VPC client, but the endpoint SG only admits the
      workload SGs - so an in-VPC admin host's aws/docker calls to
      ecr/logs/secretsmanager/ecs otherwise time out. Grants that SG 443 to
      the shared endpoint SG. Leave empty when operating from outside the
      VPC.

  CreateSupportingEndpoints:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      Master switch for the interface VPC endpoints Fargate itself depends on
      - ecr.api, ecr.dkr, logs, secretsmanager, ecs (billed per AZ-hour).
      Pair with PrivateRouteTableIds for the free S3 gateway endpoint -
      without it, no-NAT image pulls still fail (ECR layers are served from
      S3). Leave false when the private subnets already have NAT egress. Note
      the gateway still needs an egress path to the Okta issuer for OIDC
      either way - no VPC endpoint can provide that. Use the per-endpoint
      toggles below to SKIP any service the landing zone already centralizes
      (a shared endpoint with a private hosted zone associated to this VPC) -
      creating a local private-DNS endpoint for the same service otherwise
      fails with a "conflicting DNS" error.

  CreateEcrApiEndpoint:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Create the local ecr.api endpoint (false if centralized). Only applies when CreateSupportingEndpoints=true.

  CreateEcrDkrEndpoint:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Create the local ecr.dkr endpoint (false if centralized). Only applies when CreateSupportingEndpoints=true.

  CreateLogsEndpoint:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Create the local logs endpoint (false if centralized). Only applies when CreateSupportingEndpoints=true.

  CreateSecretsManagerEndpoint:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Create the local secretsmanager endpoint (false if centralized). Only applies when CreateSupportingEndpoints=true.

  CreateEcsEndpoint:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Create the local ecs endpoint (false if centralized). Only applies when CreateSupportingEndpoints=true.

  PrivateRouteTableIds:
    Type: CommaDelimitedList
    Default: ''
    Description: >-
      Route table IDs of the private subnets. When set, creates a free S3
      gateway endpoint - worthwhile in every VPC (ECR image layers are
      served from S3, so this keeps pulls off NAT data-processing charges),
      and required for pulls to work at all when there is no NAT. Leave
      empty to skip.

  CertExpiryAlarmDays:
    Type: Number
    Default: 30
    MinValue: 1
    Description: >-
      Alarm when the imported certificate has this many days (or fewer)
      left. Imported ACM certs do NOT auto-renew - this alarm is the
      renewal reminder.

  AlarmSnsTopicArn:
    Type: String
    Default: ''
    Description: >-
      Optional SNS topic ARN to notify when the certificate-expiry alarm
      fires. Leave empty to create the alarm without a notification action
      (still visible in the CloudWatch console).

  AlbLogRetentionDays:
    Type: Number
    Default: 90
    MinValue: 1
    Description: Days to keep ALB access logs in the logs bucket before expiry.

  HttpsProxyUrl:
    Type: String
    Default: ''
    Description: >-
      Optional egress proxy URL (e.g. http://proxy.corp.example.com:3128)
      injected as HTTP_PROXY/HTTPS_PROXY into the gateway task. Set it when
      the landing zone mandates a central proxy for internet egress (the
      Okta issuer). Leave empty when egress is via NAT - local or a Transit
      Gateway egress VPC. AWS API calls and the database stay direct via
      NO_PROXY (.amazonaws.com), so Bedrock still flows through the VPC
      endpoint either way.

  HttpsProxyPort:
    Type: String
    Default: ''
    AllowedPattern: '^[0-9]*$'
    Description: >-
      Port of HttpsProxyUrl. Task egress is scoped to tcp/443 plus this
      port, so a non-443 proxy needs it opened here (deploy-gateway.sh
      derives it from HTTPS_PROXY_URL automatically). Leave empty when no
      proxy, or when the proxy listens on 443.

  # Telemetry runs as a co-resident ADOT collector SIDECAR in the gateway
  # task (loopback 127.0.0.1:4318, never on the network - closes SC-8 by
  # eliminating the hop; see the otel-collector container below). These four
  # come from 03-observability.yaml's outputs via deploy.env; empty
  # ObservabilityAmpRemoteWriteEndpoint disables telemetry entirely.
  ObservabilityAmpRemoteWriteEndpoint:
    Type: String
    Default: ''
    Description: >-
      The AMP workspace Prometheus endpoint URL (03's WorkspacePrometheusEndpoint
      output; ends with a trailing '/'). The sidecar's exporter appends
      'api/v1/remote_write'. Empty disables the telemetry sidecar entirely.

  ObservabilityAmpWorkspaceArn:
    Type: String
    Default: ''
    Description: >-
      The AMP workspace ARN (03's WorkspaceArn output) - scopes the task
      role's aps:RemoteWrite. Required when the sidecar is enabled.

  ObservabilityActivityLogGroup:
    Type: String
    Default: ''
    Description: >-
      NAME of 03's activity-log CloudWatch group (ActivityLogGroupName output).
      The sidecar's logs exporter writes the activity stream here, and the
      task role is scoped to it. Required when the sidecar is enabled.

  CollectorImage:
    Type: String
    Default: ''
    Description: >-
      Mirrored ADOT collector image URI (the SAME image mirror-collector.sh
      produces and persists as COLLECTOR_IMAGE) - runs as the telemetry
      sidecar. Pin by digest. Required when the sidecar is enabled.

  TelemetryFailClosed:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >-
      'true' (default) marks the telemetry sidecar Essential and gates the
      gateway container on its health: a collector that fails its health
      check or crash-loops takes the task down (ECS replaces it) instead of
      letting the gateway serve traffic unmonitored - the AU-5 fail-closed
      posture (do not operate while audit/telemetry processing is down).
      'false' prefers gateway availability: the sidecar still self-heals via
      its restart policy, but its failure never stops traffic - telemetry
      can silently gap. Policy decision; record it in the SSP either way.
      No effect unless the sidecar is enabled. FIRST-BOOT CAUTION: fail-closed
      makes the gateway wait on the collector HEALTHY, and with
      MinimumHealthyPercent 100 + no deployment circuit breaker a wrong
      health check would hang the rollout at services-stable. Deploy 'false'
      first, confirm the otel-collector container reports HEALTHY, then flip
      to 'true' (test-run-runbook migration note).

  ForwardActivityLogs:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      Also forward the ACTIVITY LOG stream (bash commands, tool inputs,
      file paths per user - prompt content stays redacted). Highly
      sensitive; enable only where an AI-activity audit trail is required.
      Lands in a short CloudWatch window + S3 archive via the
      observability stack. No effect unless the telemetry sidecar is enabled
      (ObservabilityAmpRemoteWriteEndpoint set).

  DbAdminLambdaImage:
    Type: String
    Description: >-
      ECR image URI built from docker/db-admin/ by
      scripts/build-and-push-dbadmin.sh. Runs the one-time bootstrap that
      creates the least-privilege application DB users (the gateway never
      connects as the RDS master user) and the alternating-users secret
      rotation, which also rolls the service so tasks pick up the new
      credential.

  AppSecretRotationDays:
    Type: Number
    Default: 90
    MinValue: 1
    Description: >-
      Rotation cadence for the application DB user secret. Alternating
      users: the previous credential stays valid until the NEXT rotation,
      so a rotation is never time-critical for running tasks.

  OpusModelId:
    Type: String
    Default: claude-opus-4-8
    Description: Opus model ID presented to Claude Code clients through the gateway.

  OpusBedrockModelId:
    Type: String
    Default: us-gov.anthropic.claude-opus-4-8
    Description: >-
      Bedrock model / inference-profile ID the gateway invokes for Opus.
      Default is the GovCloud geo inference profile for Claude Opus 4.8
      (us-gov-west-1 also supports in-region invocation via
      anthropic.claude-opus-4-8). Verify against the Bedrock console:
      aws bedrock list-inference-profiles --region us-gov-west-1.

  SonnetModelId:
    Type: String
    Default: claude-sonnet-4-5
    Description: Sonnet model ID presented to Claude Code clients through the gateway.

  SonnetBedrockModelId:
    Type: String
    Default: us-gov.anthropic.claude-sonnet-4-5-20250929-v1:0
    Description: >-
      Bedrock model / inference-profile ID the gateway invokes for Sonnet.
      Default is the GovCloud geo inference profile for Claude Sonnet 4.5 —
      the newest Sonnet available in GovCloud (Sonnet 4.6 and Sonnet 5 are
      not offered there); note older models keep the dated -v1:0 ID format.
      Verify against the Bedrock console.

# Fargate only accepts specific CPU/memory pairings; an invalid combo
# otherwise surfaces as an opaque task-definition error mid-deploy.
Rules:
  FargateMemoryForCpu512:
    RuleCondition: !Equals [!Ref TaskCpu, '512']
    Assertions:
      - Assert:
          Fn::Contains: [['1024', '2048', '3072', '4096'], !Ref TaskMemory]
        AssertDescription: With TaskCpu 512, TaskMemory must be 1024-4096 in 1024 steps.
  FargateMemoryForCpu1024:
    RuleCondition: !Equals [!Ref TaskCpu, '1024']
    Assertions:
      - Assert:
          Fn::Contains: [['2048', '3072', '4096', '5120', '6144', '7168', '8192'], !Ref TaskMemory]
        AssertDescription: With TaskCpu 1024, TaskMemory must be 2048-8192 in 1024 steps.
  FargateMemoryForCpu2048:
    RuleCondition: !Equals [!Ref TaskCpu, '2048']
    Assertions:
      - Assert:
          Fn::Contains: [['4096', '5120', '6144', '7168', '8192', '9216', '10240', '11264', '12288', '13312', '14336', '15360', '16384'], !Ref TaskMemory]
        AssertDescription: With TaskCpu 2048, TaskMemory must be 4096-16384 in 1024 steps.
  FargateMemoryForCpu4096:
    RuleCondition: !Equals [!Ref TaskCpu, '4096']
    Assertions:
      - Assert:
          Fn::Contains: [['8192', '9216', '10240', '11264', '12288', '13312', '14336', '15360', '16384', '17408', '18432', '19456', '20480', '21504', '22528', '23552', '24576', '25600', '26624', '27648', '28672', '29696', '30720'], !Ref TaskMemory]
        AssertDescription: With TaskCpu 4096, TaskMemory must be 8192-30720 in 1024 steps.

Conditions:
  WantBedrockEndpoint: !Equals [!Ref CreateBedrockEndpoint, 'true']
  WantBedrockPrivateDns: !Equals [!Ref BedrockPrivateDns, 'true']
  WantSupportingEndpoints: !Equals [!Ref CreateSupportingEndpoints, 'true']
  WantEcrApiEndpoint: !And [!Condition WantSupportingEndpoints, !Equals [!Ref CreateEcrApiEndpoint, 'true']]
  WantEcrDkrEndpoint: !And [!Condition WantSupportingEndpoints, !Equals [!Ref CreateEcrDkrEndpoint, 'true']]
  WantLogsEndpoint: !And [!Condition WantSupportingEndpoints, !Equals [!Ref CreateLogsEndpoint, 'true']]
  WantSecretsManagerEndpoint: !And [!Condition WantSupportingEndpoints, !Equals [!Ref CreateSecretsManagerEndpoint, 'true']]
  WantEcsEndpoint: !And [!Condition WantSupportingEndpoints, !Equals [!Ref CreateEcsEndpoint, 'true']]
  WantAnyInterfaceEndpoint: !Or [!Condition WantBedrockEndpoint, !Condition WantSupportingEndpoints]
  HaveAdminClientSg: !Not [!Equals [!Ref AdminClientSecurityGroupId, '']]
  WantAdminEndpointIngress: !And [!Condition WantAnyInterfaceEndpoint, !Condition HaveAdminClientSg]
  WantS3Endpoint: !Not [!Equals [!Join ['', !Ref PrivateRouteTableIds], '']]
  HaveAlarmTopic: !Not [!Equals [!Ref AlarmSnsTopicArn, '']]
  HaveProxy: !Not [!Equals [!Ref HttpsProxyUrl, '']]
  HaveProxyPort: !Not [!Equals [!Ref HttpsProxyPort, '']]
  HaveTelemetry: !Not [!Equals [!Ref ObservabilityAmpRemoteWriteEndpoint, '']]
  # Fail-closed telemetry (AU-5): only meaningful when the sidecar exists.
  WantTelemetryFailClosed: !And
    - !Condition HaveTelemetry
    - !Equals [!Ref TelemetryFailClosed, 'true']

# Regional accounts the LEGACY ELB access-log writer authenticates as
# (regions launched before Aug 2022, incl. GovCloud). See AlbLogsBucketPolicy.
Mappings:
  ElbAccount:
    us-gov-west-1: { Id: '048591011584' }
    us-gov-east-1: { Id: '190560391635' }
    us-east-1:     { Id: '127311923021' }
    us-east-2:     { Id: '033677994240' }
    us-west-1:     { Id: '027434742980' }
    us-west-2:     { Id: '797873946194' }

Resources:

  # ------------------------------------------------------------------ secrets
  # All encrypted with the CMK exported by 01-database.yaml (C1/SC-28).
  OktaClientSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${NamePrefix}/oidc-client-secret'
      Description: Okta OIDC client secret. Placeholder at creation - set the real value after deploy.
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
      SecretString: 'REPLACE-ME-run-aws-secretsmanager-put-secret-value'

  JwtSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${NamePrefix}/jwt-secret'
      Description: Gateway session-signing secret (rotate per the runbook - prepend new value, roll, remove old).
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true

  # Spend-limit admin API keys. The gateway's `admin:` block is what ENABLES
  # spend enforcement at all (without it, `enforcement.fail_closed_on_error`
  # is inert), and mutating a cap requires a write key. Generated here rather
  # than set out-of-band: they are random bearer tokens, not operator-supplied
  # values, so there is no placeholder-clobber hazard. `id:` in the config is
  # the audit attribution recorded in the gateway's admin_audit table.
  SpendAdminWriteKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${NamePrefix}/spend-admin-write-key'
      Description: Write key for the gateway spend-limit admin API (create/update/delete caps).
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true

  SpendAdminReadKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${NamePrefix}/spend-admin-read-key'
      Description: Read-only key for the gateway spend-limit admin API (list caps / period-to-date spend).
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
      GenerateSecretString:
        PasswordLength: 48
        ExcludePunctuation: true

  # Application DB credential (least privilege - AC-6). The DbBootstrap
  # custom resource writes the real value (username/password/host/...);
  # rotation alternates between gateway_app and gateway_app_clone. The RDS
  # master secret is break-glass only - no task ever injects it.
  DbAppUserSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${NamePrefix}/db-app-user'
      Description: >-
        Application DB user for the gateway (alternating-users rotation;
        managed by the db-admin Lambda - do not edit by hand).
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
      SecretString: '{"bootstrap": "pending"}'

  # ------------------------------------------------------------ load balancer
  # SG egress is scoped everywhere (SC-7): inline lists replace the default
  # allow-all; 127.0.0.1/32 is the CFN idiom for "nothing beyond the
  # explicit standalone rules". The ALB->tasks rule is standalone to break
  # the reference cycle with ServiceSecurityGroup's ingress; the tasks'
  # 5432 comes from the attached db-client SG (01-database.yaml). Telemetry
  # to the collector needs no SG rule - it is a loopback sidecar in the task.
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${NamePrefix} - internal ALB (TLS from developer networks)'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref ClientIngressCidr
          Description: HTTPS from developer/VPN/ZPA-connector networks
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 127.0.0.1/32
          Description: no egress except explicit standalone rules
      Tags:
        - Key: Name
          Value: !Sub '${NamePrefix}-alb'

  AlbToServiceEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref AlbSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      DestinationSecurityGroupId: !Ref ServiceSecurityGroup
      Description: Forward/health-check to gateway tasks

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${NamePrefix} - gateway tasks'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref AlbSecurityGroup
          Description: TLS (ALB re-encrypt) from the ALB only
      SecurityGroupEgress:
        # Okta (public), ECR/S3/logs/Secrets Manager/Bedrock/AMP - all TLS,
        # whether via VPC endpoints, NAT, or TGW central egress. The
        # database (5432) rides the attached db-client SG from 01.
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS to Okta and AWS services
        - !If
          - HaveProxyPort
          - IpProtocol: tcp
            FromPort: !Ref HttpsProxyPort
            ToPort: !Ref HttpsProxyPort
            CidrIp: 0.0.0.0/0
            Description: Egress proxy port
          - !Ref 'AWS::NoValue'
      Tags:
        - Key: Name
          Value: !Sub '${NamePrefix}-svc'

  # ALB access logs land here. This bucket deliberately stays SSE-S3
  # (AES256): ELB access-log delivery does NOT support SSE-KMS - the one
  # store in the deployment that cannot use the CMK. Delivery is via the
  # regional ELB account, granted in the bucket policy below.
  AlbLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LifecycleConfiguration:
        Rules:
          - Id: expire-alb-logs
            Status: Enabled
            ExpirationInDays: !Ref AlbLogRetentionDays

  AlbLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AlbLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # BOTH delivery principals, deliberately. Test-run finding
          # (us-gov-west-1): with only the service principal granted, the
          # log-delivery test-write INTERMITTENTLY (then consistently) got
          # AccessDenied on a verified-correct policy - GovCloud's writer
          # still authenticates as the legacy regional ELB account. AWS's
          # current recommendation is the service principal, and either
          # writer may be used in a legacy region, so grant both and be
          # correct regardless of which one shows up. The legacy writer's
          # bucket-owner-full-control canned ACL is the one ACL that
          # BucketOwnerEnforced still accepts, so ACLs-disabled is safe here.
          # Resource scopes both to this account's log path.
          - Sid: AllowElbLogDeliveryServicePrincipal
            Effect: Allow
            Principal:
              Service: logdelivery.elasticloadbalancing.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${AlbLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/*'
          - Sid: AllowElbLogDeliveryLegacyAccount
            Effect: Allow
            Principal:
              AWS: !Sub
                - 'arn:${AWS::Partition}:iam::${ElbAccountId}:root'
                - ElbAccountId: !FindInMap [ElbAccount, !Ref 'AWS::Region', Id]
            Action: s3:PutObject
            Resource: !Sub '${AlbLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/*'

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    # The bucket policy must exist before ELB validates log delivery.
    DependsOn: AlbLogsBucketPolicy
    Properties:
      Name: !Sub '${NamePrefix}-alb'
      Scheme: internal
      Type: application
      # IPv4-only is REQUIRED: dual-stack internal ALBs publish public-range
      # AAAA records, which fails Claude Code's /login private-network check.
      IpAddressType: ipv4
      Subnets: !Ref PrivateSubnetIds
      SecurityGroups:
        - !Ref AlbSecurityGroup
      # Test-run lesson: if a landing-zone auto-remediation also manages ALB
      # access logs (pointing them at a central bucket), it will fight this
      # template - the intermittent create-time AccessDenied we chased was
      # that automation, not a policy bug. Exempt this ALB from any such
      # rule (or adopt the central bucket) BEFORE deploying.
      # deletion_protection at create no longer risks a DELETE_FAILED wedge:
      # deploy-gateway.sh uses --disable-rollback, so failed creates keep
      # resources instead of attempting an (un-deletable) rollback. Stack
      # DELETION still requires disabling protection first - by design.
      LoadBalancerAttributes:
        - Key: deletion_protection.enabled
          Value: 'true'
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
        # Streaming inference: a turn can stay silent for minutes; the 60s
        # default idle timeout truncates the SSE stream mid-response.
        - Key: idle_timeout.timeout_seconds
          Value: !Ref AlbIdleTimeoutSeconds
        - Key: access_logs.s3.enabled
          Value: 'true'
        - Key: access_logs.s3.bucket
          Value: !Ref AlbLogsBucket

  # No Name: the HTTP->HTTPS protocol change (and any future protocol
  # change) replaces the target group, and a fixed name would collide with
  # itself mid-update. HTTPS to the target = the ALB re-encrypts; target
  # certs are not validated by ALBs, so the per-task self-signed cert works.
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VpcId
      Protocol: HTTPS
      Port: 8080
      TargetType: ip
      # Explicit: ALB health checks default to HTTP regardless of the
      # target-group protocol - without this the probe hits the TLS
      # listener in plaintext and no target ever goes healthy.
      HealthCheckProtocol: HTTPS
      # /healthz (liveness) keeps signed-in developers working through a
      # Postgres outage; use /readyz instead to pull replicas when the store is down.
      HealthCheckPath: /healthz
      HealthCheckIntervalSeconds: 15
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetGroupAttributes:
        # See the DeregistrationDelaySeconds parameter for the drain/deploy
        # trade-off (streams older than the delay are still cut on deploys).
        - Key: deregistration_delay.timeout_seconds
          Value: !Ref DeregistrationDelaySeconds

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Protocol: HTTPS
      Port: 443
      SslPolicy: !Ref TlsSecurityPolicy
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ------------------------------------------------------------------ ECS
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${NamePrefix}-cluster'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  LogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/ecs/${NamePrefix}'
      RetentionInDays: 365
      # The tag is load-bearing on already-deployed stacks: a change that
      # touches ONLY DeletionPolicy/UpdateReplacePolicy can be dropped as a
      # no-op (CFN coverage-roadmap #1543), silently leaving the old delete
      # policy in force. The tag makes the update a real property diff so the
      # Retain policies actually record. Do not remove it.
      Tags:
        - Key: retention-policy
          Value: retain-on-teardown
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'

  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${NamePrefix}-execution'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
      Policies:
        - PolicyName: read-secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # App-scoped DB credential only - tasks never read the RDS
              # master secret (break-glass, humans only).
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref OktaClientSecret
                  - !Ref JwtSecret
                  - !Ref DbAppUserSecret
                  - !Ref SpendAdminWriteKeySecret
                  - !Ref SpendAdminReadKeySecret
              # The secrets are CMK-encrypted; decrypt rides IAM (the key
              # policy delegates to IAM via the account-root statement).
              - Effect: Allow
                Action: kms:Decrypt
                Resource:
                  Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${NamePrefix}-task'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: bedrock-invoke-claude-only
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: InvokeClaudeModels
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                # Exactly the two configured models, not anthropic.* - the
                # inference profiles in-region, plus their underlying
                # foundation models (profile ID minus the 'us-gov.' geo
                # prefix). Foundation-model region stays * because geo
                # profiles fan out across us-gov regions at invocation.
                # Switching models is still a parameter-only change.
                Resource:
                  - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${OpusBedrockModelId}'
                  - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${SonnetBedrockModelId}'
                  - !Sub
                    - 'arn:${AWS::Partition}:bedrock:*::foundation-model/${Model}'
                    - Model: !Join ['', !Split ['us-gov.', !Ref OpusBedrockModelId]]
                  - !Sub
                    - 'arn:${AWS::Partition}:bedrock:*::foundation-model/${Model}'
                    - Model: !Join ['', !Split ['us-gov.', !Ref SonnetBedrockModelId]]
        # Telemetry sidecar credentials (only when enabled): the co-resident
        # collector runs under THIS task role and writes to AMP + the activity
        # log group. Ported from 03's former CollectorTaskRole. The activity
        # log group's CMK encryption is service-side (no caller KMS needed),
        # but AMP remote_write is NOT: writing to a CMK-encrypted workspace
        # requires the CALLER to hold kms:GenerateDataKey on the CMK. The
        # aps.<region> service grant on the key covers ingestion but the
        # data-plane write is charged to this task role - without it,
        # remote_write returns 403 "not authorized to perform
        # kms:GenerateDataKey" and NO metrics ever land (test-run lesson).
        # Scoped to aps via kms:ViaService.
        - !If
          - HaveTelemetry
          - PolicyName: telemetry-sidecar
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Sid: AmpRemoteWrite
                  Effect: Allow
                  Action: aps:RemoteWrite
                  Resource: !Ref ObservabilityAmpWorkspaceArn
                - Sid: AmpRemoteWriteKms
                  Effect: Allow
                  Action: kms:GenerateDataKey
                  Resource:
                    Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
                  Condition:
                    StringEquals:
                      kms:ViaService: !Sub 'aps.${AWS::Region}.amazonaws.com'
                - Sid: ActivityLogWrite
                  Effect: Allow
                  Action:
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                    - logs:DescribeLogStreams
                  Resource:
                    - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:${ObservabilityActivityLogGroup}'
                    - !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:${ObservabilityActivityLogGroup}:*'
          - !Ref 'AWS::NoValue'

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${NamePrefix}-gateway'
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: gateway
          Image: !Ref ContainerImage
          Essential: true
          # The dependency does double duty. START-UP: the collector must be
          # up (HEALTHY when fail-closed, started otherwise) before the
          # gateway accepts traffic, so the first requests are never
          # unmonitored. SHUT-DOWN: ECS stops dependent containers in REVERSE
          # dependency order, so on every task stop - including the service
          # roll that EVERY secret rotation forces - the gateway is SIGTERMed
          # and exits FIRST (emitting its final OTLP exports), and only then
          # is the collector stopped, flushing its buffered batch (batch
          # processor holds up to 30s) to AMP/CloudWatch within its
          # StopTimeout. Without this ordering both containers are SIGTERMed
          # together and the final telemetry window is silently dropped.
          DependsOn: !If
            - HaveTelemetry
            - - ContainerName: otel-collector
                Condition: !If [WantTelemetryFailClosed, HEALTHY, START]
            - !Ref 'AWS::NoValue'
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: gateway
          Environment:
            - Name: CLAUDE_CONFIG_DIR
              Value: /tmp/.claude
            - Name: CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC
              Value: '1'
            - Name: CLAUDE_GATEWAY_LOG_LEVEL
              Value: info
            # Egress proxy for public endpoints (Okta). NO_PROXY keeps AWS
            # API calls on the VPC endpoints (Bedrock private DNS resolves
            # under .amazonaws.com) and the database direct off the proxy.
            # Telemetry no longer traverses the proxy either way - the
            # collector is a loopback sidecar (localhost, already in NO_PROXY).
            - !If
              - HaveProxy
              - Name: HTTP_PROXY
                Value: !Ref HttpsProxyUrl
              - !Ref 'AWS::NoValue'
            - !If
              - HaveProxy
              - Name: HTTPS_PROXY
                Value: !Ref HttpsProxyUrl
              - !Ref 'AWS::NoValue'
            - !If
              - HaveProxy
              - Name: NO_PROXY
                # Loopback + link-local + AWS APIs. The former
                # .${NamePrefix}.internal Cloud Map entry is gone with the
                # collector service (03 no longer creates the namespace).
                Value: 'localhost,127.0.0.1,169.254.169.254,169.254.170.2,.amazonaws.com'
              - !Ref 'AWS::NoValue'
            - Name: PGHOST
              Value:
                Fn::ImportValue: !Sub '${NamePrefix}-db-endpoint'
            - Name: PGPORT
              Value:
                Fn::ImportValue: !Sub '${NamePrefix}-db-port'
            - Name: PGDATABASE
              Value:
                Fn::ImportValue: !Sub '${NamePrefix}-db-name'
            # gateway.yaml, rendered by CloudFormation and decoded by the
            # container entrypoint. ${!VAR} below escapes CFN substitution so
            # the gateway's own ${ENV} expansion sees the literal placeholder.
            - Name: GATEWAY_CONFIG_B64
              Value:
                # Two-arg !Sub: the config body is the first element; the second
                # supplies OidcScopesLine, the full `scopes:` line. It is now a
                # CONSTANT (was conditional on the retired ManagedCliGroups): the
                # `groups` scope is a hard prerequisite because per-group spend caps
                # (scope_type `rbac_group`) resolve against the Okta groups claim.
                # Kept as a Sub var purely to avoid reindenting the whole body.
                Fn::Base64: !Sub
                  - |
                    listen:
                      host: 0.0.0.0
                      port: 8080
                      public_url: https://${GatewayFqdn}
                      # Serve TLS on the task itself (SC-8) - the ALB
                      # re-encrypts to the target. Cert/key are generated
                      # per-task by the entrypoint at these paths.
                      tls:
                        cert: /etc/claude/tls/server.crt
                        key: /etc/claude/tls/server.key
                      trusted_proxies: ["${VpcCidr}"]

                    oidc:
                      issuer: ${OktaIssuer}
                      client_id: ${OktaClientId}
                      client_secret: ${!OIDC_CLIENT_SECRET}
                      allowed_email_domains: [${AllowedEmailDomains}]
                      # Okta org authorization server omits email/groups from the
                      # id_token; harmless when using a custom auth server.
                      userinfo_fallback: true
                      # The `groups` scope is required for per-group spend caps
                      # (rbac_group). Rendered from the OidcScopesLine Sub var.
                      ${OidcScopesLine}

                    session:
                      jwt_secret: ${!GATEWAY_JWT_SECRET}
                      ttl_hours: ${SessionTtlHours}

                    store:
                      postgres_url: ${!GATEWAY_POSTGRES_URL}

                    upstreams:
                      - provider: bedrock
                        region: ${AWS::Region}
                        auth: {}   # ECS task role via the default credential chain

                    # GovCloud serves Claude through us-gov.* inference profiles.
                    # If the built-in catalog does not resolve them on your gateway
                    # version, disable it and map models explicitly. Developers see
                    # both entries in the Claude Code model picker; the mapping is
                    # parameterized (OpusModelId/SonnetModelId + Bedrock IDs).
                    # upstream_model is an OBJECT keyed by the upstream's name -
                    # the single bedrock upstream above has no `name:`, so it keys
                    # on its provider string, `bedrock`. A bare string fails schema
                    # validation ("Expected object, received string").
                    auto_include_builtin_models: false
                    models:
                      - id: ${OpusModelId}
                        upstream_model:
                          bedrock: ${OpusBedrockModelId}
                      - id: ${SonnetModelId}
                        upstream_model:
                          bedrock: ${SonnetBedrockModelId}

                    # --- Cost controls (per-user / per-group spend caps) ------
                    # The `admin:` block is the MASTER SWITCH: the gateway only
                    # runs spend enforcement when admin is configured, and
                    # `enforcement.fail_closed_on_error` is explicitly inert
                    # without it (the config schema refuses the combination).
                    # Caps themselves are DATA, not config - rows in the
                    # gateway's `spend_limits` table, written through
                    # POST /v1/organizations/spend_limits with a write key
                    # (see scripts/set-spend-limit.sh). No cap rows = no
                    # enforcement, so this block is safe to ship before any
                    # limits are set.
                    # `id:` is audit attribution, recorded in admin_audit.
                    admin:
                      write_keys:
                        - id: deploy-write
                          key: ${!SPEND_ADMIN_WRITE_KEY}
                      read_keys:
                        - id: deploy-read
                          key: ${!SPEND_ADMIN_READ_KEY}
                      group_limit_mode: ${SpendGroupLimitMode}
                      blocked_message: '${SpendBlockedMessage}'
                      # Retention for the audit / spend / identity tables.
                      audit_retention_days: 365
                      spend_retention_months: 13
                      identity_retention_days: 90

                    # FAIL CLOSED (operator decision, 2026-07-24): if the spend
                    # store is unreachable or errors, the gateway returns 429
                    # rather than allowing an uncapped request. This is an
                    # AVAILABILITY TRADE: a store outage halts ALL inference
                    # fleet-wide, not just cost tracking. See om-runbooks.
                    enforcement:
                      fail_closed_on_error: true

                    # Per-IdP-group guardrails and managed settings - this is the
                    # BINARY-VERIFIED shape that GATEWAY_MANAGED_B64 renders below:
                    # managed:
                    #   policies:
                    #     - match: { groups: [claude-developers] }
                    #       cli:
                    #         env: { DISABLE_UPDATES: "1" }
                    #     - cli:                       # no `match:` = catch-all, MUST BE LAST
                    #         availableModels: [claude-opus-4-8, claude-sonnet-4-5]
                    # ORDER IS LOAD-BEARING. Selection is FIRST-MATCH-WINS over a SINGLE
                    # policy - a catch-all is normalized to `match: {}` and matches
                    # everyone, so any policy after it is dead config. The gateway warns
                    # ("is a catch-all ... but is not the last entry") and still BOOTS, so
                    # this fails silently. With the catch-all LAST the gateway merges its
                    # `cli` as a BASE into each earlier policy ("after merge with catch-all
                    # base - changed keys: ..."), so group members get the allowlist AND
                    # the lockdown, and everyone else falls through to the catch-all.
                    # `match` is OPTIONAL (a policy without it matches every user, so a
                    # model allowlist needs no Okta groups claim). Everything the client
                    # actually honors goes INSIDE `cli` - its keys are Claude Code
                    # settings.json keys. `availableModels` at the POLICY level is an
                    # unrecognized key and FAILS config validation ("Unrecognized key(s)
                    # in object: 'availableModels'") - a boot failure, not a no-op.
                    # `cli` is NOT a free-form passthrough either: unknown keys inside it
                    # are fatal too ("unknown settings key"), but that check runs only
                    # AFTER the Postgres store connects - so a config probe against an
                    # unreachable DB will NOT catch a typo in here. Verified against the
                    # mirrored 2.1.211 gateway binary, incl. a live throwaway Postgres,
                    # 2026-07-24.
                  # The `groups` scope is now requested UNCONDITIONALLY: per-group
                  # spend caps (scope_type `rbac_group`) resolve against the Okta
                  # groups claim, so it is a hard prerequisite rather than an
                  # opt-in. Kept as a Sub var to avoid reindenting the body.
                  - OidcScopesLine: 'scopes: [openid, profile, email, offline_access, groups]'
            # SSRF guard override - REQUIRED for the loopback sidecar.
            # The gateway installs a custom DNS lookup that refuses any address
            # resolving into a blocked range, and LOOPBACK IS BLOCKED BY DEFAULT:
            #   if (range === "loopback") return !allowLoopback()
            #   allowLoopback() = truthy(process.env.CLAUDE_GATEWAY_ALLOW_LOOPBACK)
            # Without this the forward fails at RUNTIME (config validates fine):
            #   forward to http://localhost:4318 failed:
            #   ECONNREFUSED_SSRF: blocked (cloud metadata / link-local): localhost -> 127.0.0.1
            # This does NOT weaken cloud-metadata protection: the flag re-permits
            # only `loopback` and `unspecified`. `linkLocal` (169.254.0.0/16, incl.
            # EC2 IMDS 169.254.169.254), 100.100.100.200 and fd00:ec2::254 stay
            # blocked unconditionally. Truthy values: 1/true/yes/on.
            # Scoped to HaveTelemetry so the guard stays maximally strict when no
            # sidecar exists. Side effect: suppresses the startup "pod can reach
            # cloud metadata endpoint" probe warning (diagnostic only).
            # BINARY-VERIFIED against the mirrored 2.1.211 gateway, 2026-07-24.
            - !If
              - HaveTelemetry
              - Name: CLAUDE_GATEWAY_ALLOW_LOOPBACK
                Value: '1'
              - !Ref 'AWS::NoValue'
            # Telemetry forwarding, appended to gateway.yaml by the
            # entrypoint when set. The gateway also auto-pushes the OTLP
            # enable env vars to every connected client via /managed/settings.
            # forward_to is the co-resident collector sidecar over loopback -
            # the gateway REFUSES a non-HTTPS forward_to URL unless the host is
            # localhost, so localhost:4318 is both the point of the sidecar and
            # the only plaintext target it will accept (live-run lesson; see the
            # otel-collector container below and SECURITY_REVIEW C2). NOTE the
            # loopback target ALSO requires CLAUDE_GATEWAY_ALLOW_LOOPBACK above.
            - !If
              - HaveTelemetry
              - Name: GATEWAY_TELEMETRY_B64
                Value:
                  Fn::Base64: !Sub
                    - |
                      telemetry:
                        forward_to:
                          - url: http://localhost:4318
                            metrics: true
                            logs: ${LogsFlag}
                    - LogsFlag: !Ref ForwardActivityLogs
              - !Ref 'AWS::NoValue'
            # Managed client settings, appended to gateway.yaml by the entrypoint
            # and pushed to every connected client via /managed/settings (the same
            # mechanism the telemetry block relies on). A SINGLE catch-all policy
            # (no `match:`), so it reaches every authenticated user with no Okta
            # groups claim required:
            #
            #  * availableModels / enforceAvailableModels - constrains the client's
            #    `/model` picker to the two configured models. Without it the client
            #    shows its OWN built-in menu, none of whose entries the gateway
            #    serves, so every pick fails upstream as unauthorized. `models:`
            #    above governs only what the GATEWAY SERVES; it does not reach into
            #    the picker. `enforceAvailableModels` extends the allowlist to the
            #    "Default" selection so Default can't resolve to an unserved model.
            #    IDs match the `models:` entries above by construction.
            #  * env - the update lockdown, the server-side twin of the installer's
            #    -DisableUpdates. This USED to be scoped to `MANAGED_CLI_GROUPS`
            #    Okta groups; it now applies to everyone, which is strictly broader
            #    coverage AND drops the groups-claim dependency (2026-07-24).
            #
            # Ordering note (kept for the next maintainer): selection is
            # FIRST-MATCH-WINS over a SINGLE policy, and a `match:`-less policy is
            # normalized to `match: {}` = matches everyone. If a group-scoped policy
            # is ever added back it MUST come BEFORE this one, or it is dead config
            # - the gateway warns and still boots, so it fails silently.
            - Name: GATEWAY_MANAGED_B64
              Value:
                Fn::Base64: !Sub |
                  managed:
                    policies:
                      - cli:
                          availableModels: ['${OpusModelId}', '${SonnetModelId}']
                          enforceAvailableModels: true
                          env: { DISABLE_UPDATES: "1", DISABLE_AUTOUPDATER: "1" }
          Secrets:
            - Name: OIDC_CLIENT_SECRET
              ValueFrom: !Ref OktaClientSecret
            - Name: GATEWAY_JWT_SECRET
              ValueFrom: !Ref JwtSecret
            # Spend-limit admin API keys (see the `admin:` block in the config).
            - Name: SPEND_ADMIN_WRITE_KEY
              ValueFrom: !Ref SpendAdminWriteKeySecret
            - Name: SPEND_ADMIN_READ_KEY
              ValueFrom: !Ref SpendAdminReadKeySecret
            # The APP user (created by DbBootstrap), never the master.
            - Name: PGUSER
              ValueFrom: !Sub '${DbAppUserSecret}:username::'
            - Name: PGPASSWORD
              ValueFrom: !Sub '${DbAppUserSecret}:password::'
        # Telemetry sidecar (only when enabled): the ADOT collector, co-resident
        # in the gateway task. It listens on LOOPBACK ONLY (127.0.0.1:4317/4318)
        # so nothing off-task can reach it; the gateway forwards to it over the
        # shared task network namespace. This ELIMINATES the former plaintext
        # gateway->collector network hop - SC-8 is satisfied by absence of
        # transmission (see SECURITY_REVIEW C2). Ported from 03's former
        # collector service; it runs under this task's TaskRole.
        - !If
          - HaveTelemetry
          - Name: otel-collector
            Image: !Ref CollectorImage
            # Failure posture is the TelemetryFailClosed parameter (default
            # true = AU-5 fail-closed): Essential + the gateway's HEALTHY
            # dependency mean a collector that exits or fails its health
            # check stops the task - the gateway never serves unmonitored
            # traffic; ECS replaces the task while the ALB routes to the
            # peer task. RestartPolicy still absorbs TRANSIENT crashes first
            # (in-place restart, no task kill); only a collector that exits
            # again within RestartAttemptPeriod escalates to a task stop.
            # With TelemetryFailClosed=false the trade flips: the sidecar
            # self-heals but its failure never stops traffic (telemetry can
            # silently gap). Either way, a LAUNCH-time image-pull failure
            # fails the WHOLE task (ECS pulls all images before starting any
            # container), so enabling telemetry couples gateway availability
            # to CollectorImage being pullable: verify the image is present
            # in this account's ECR (mirror-collector.sh) BEFORE the
            # telemetry-enabled 02 re-run. See SECURITY_REVIEW C2 / the O&M
            # runbook. NOTE: even fail-closed only proves the collector is
            # healthy, not that AMP is ingesting - the end-to-end control is
            # 03's missing-telemetry alarm (AWS/Usage ResourceCount /
            # Resource=IngestionRate on the workspace; MissingTelemetryAlarmMinutes).
            Essential: !If [WantTelemetryFailClosed, true, false]
            RestartPolicy:
              Enabled: true
              RestartAttemptPeriod: 60
            # The ADOT image ships a /healthcheck binary (no shell in the
            # image - plain CMD, never CMD-SHELL) that probes the
            # health_check extension (loopback :13133, see AOT_CONFIG_CONTENT).
            # It catches the hung-but-running collector that Essential alone
            # (which only sees exits) would miss. Defined in BOTH postures:
            # ECS task health considers only ESSENTIAL containers with health
            # checks, so the Essential flag above is what decides whether
            # UNHEALTHY escalates - fail-closed: task replaced; fail-open:
            # status is surfaced (container shows UNHEALTHY) but traffic
            # keeps flowing.
            HealthCheck:
              Command: ['CMD', '/healthcheck']
              Interval: 30
              Timeout: 5
              Retries: 3
              StartPeriod: 30
            # Flush window for shutdown: the gateway (which DependsOn this
            # container) is stopped first; the collector then gets up to 120s
            # (Fargate max) after SIGTERM to drain its batch processor
            # (buffers up to 30s) and finish AMP/CloudWatch writes before
            # SIGKILL. The collector flushes pending exports on SIGTERM as
            # part of its graceful shutdown - best-effort, not guaranteed
            # delivery (a dead AMP endpoint at shutdown can still lose the
            # final batch; the missing-telemetry alarm is the backstop).
            StopTimeout: 120
            # NO PortMappings: same-task containers share the network namespace,
            # and nothing should be reachable from off-task.
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Ref LogGroup
                awslogs-region: !Ref AWS::Region
                awslogs-stream-prefix: otel
            Environment:
              # ADOT reads its full config from this env var. session.id is
              # dropped from metrics (unbounded cardinality); resource
              # attributes (team, cost_center, ...) are converted to metric
              # labels so Prometheus can group by them. The logs pipeline sits
              # idle until the gateway stack sets ForwardActivityLogs=true.
              #
              # SC-8 note: the receivers bind 127.0.0.1 ONLY - telemetry never
              # leaves the task network namespace on its way to the collector,
              # so there is no inter-host hop to encrypt (this replaced the old
              # SG-scoped plaintext hop, which the gateway refused to boot on).
              # remote_write to AMP and the activity-log write are ordinary TLS
              # AWS API calls made with the task role's credentials.
              - Name: AOT_CONFIG_CONTENT
                Value: !Sub |
                  extensions:
                    sigv4auth:
                      region: ${AWS::Region}
                      service: aps
                    # Serves the endpoint the container HealthCheck's
                    # /healthcheck binary probes. Loopback only, like the
                    # receivers - nothing off-task can reach it.
                    health_check:
                      endpoint: 127.0.0.1:13133
                  receivers:
                    otlp:
                      protocols:
                        grpc:
                          endpoint: 127.0.0.1:4317
                        http:
                          endpoint: 127.0.0.1:4318
                    # Heartbeat: scrape the collector's OWN internal telemetry
                    # (otelcol_* on loopback :8888, always served) into the
                    # remote_write pipeline. This makes AMP ingestion CONTINUOUS
                    # regardless of client activity, so the missing-telemetry
                    # alarm (03: AWS/Usage IngestionRate <= 0, breaching) means
                    # "pipeline broken", NOT "fleet idle" - an idle fleet emits
                    # no client metrics, and without this the alarm false-fires
                    # every quiet period (night/weekend). It also exercises the
                    # full write path end-to-end (SigV4 + kms:GenerateDataKey +
                    # AMP), so it is a genuine AU-5 liveness control, not just a
                    # container-health signal. Loopback only - no new network
                    # surface. 30s scrape >> the 60s alarm period.
                    prometheus:
                      config:
                        scrape_configs:
                          - job_name: otel-collector-self
                            scrape_interval: 30s
                            static_configs:
                              - targets: ['127.0.0.1:8888']
                  processors:
                    attributes/cardinality:
                      actions:
                        - key: session.id
                          action: delete
                    batch:
                      timeout: 30s
                  exporters:
                    prometheusremotewrite:
                      endpoint: ${ObservabilityAmpRemoteWriteEndpoint}api/v1/remote_write
                      auth:
                        authenticator: sigv4auth
                      # Keep metric names exactly as emitted (claude_code_cost_usage,
                      # not ..._USD_total) so the provisioned dashboard queries match.
                      add_metric_suffixes: false
                      resource_to_telemetry_conversion:
                        enabled: true
                    awscloudwatchlogs:
                      region: ${AWS::Region}
                      log_group_name: ${ObservabilityActivityLogGroup}
                      log_stream_name: activity
                  service:
                    # health_check here is LOAD-BEARING: the container
                    # HealthCheck's /healthcheck probe hits it, so removing
                    # it from this list makes a fail-closed task permanently
                    # unhealthy (gateway never starts - it waits on HEALTHY).
                    extensions: [sigv4auth, health_check]
                    pipelines:
                      metrics:
                        # otlp = client usage/cost metrics (bursty, only on
                        # active use); prometheus = collector self-metrics
                        # (continuous heartbeat, see the receiver comment).
                        receivers: [otlp, prometheus]
                        processors: [attributes/cardinality, batch]
                        exporters: [prometheusremotewrite]
                      logs:
                        receivers: [otlp]
                        processors: [batch]
                        exporters: [awscloudwatchlogs]
          - !Ref 'AWS::NoValue'

  Service:
    Type: AWS::ECS::Service
    # DbBootstrap: tasks inject username/password keys from the app secret,
    # which only exist after the bootstrap has written the real value.
    DependsOn: [HttpsListener, DbBootstrap]
    Properties:
      ServiceName: !Sub '${NamePrefix}-gateway'
      Cluster: !Ref Cluster
      # Required for the default (rolling) deployment controller. !Ref on a
      # TaskDefinition returns its full ARN incl. revision, so each template
      # update that changes the task def rolls the service to the new revision.
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups:
            - !Ref ServiceSecurityGroup
            - Fn::ImportValue: !Sub '${NamePrefix}-db-client-sg'
      LoadBalancers:
        - ContainerName: gateway
          ContainerPort: 8080
          TargetGroupArn: !Ref TargetGroup

  # ----------------------------------------- app DB user (AC-6) + rotation
  # The gateway connects as gateway_app / gateway_app_clone - LOGIN roles
  # that assume a NOLOGIN owner role at login, so every object has one
  # owner regardless of which user ran the migration. They hold no
  # CREATEROLE / rds_superuser powers (a compromised gateway cannot mint
  # users or quiet pgaudit). The RDS master secret is break-glass only:
  # RDS keeps auto-rotating it weekly, and since no task injects it,
  # nothing goes stale.
  #
  # Rotation is a custom Lambda (same image as the bootstrap) using the
  # ALTERNATING-USERS strategy: each rotation flips the secret to the
  # other user with a fresh password, so the previous credential stays
  # valid until the NEXT rotation - and finishSecret force-rolls the
  # service so tasks re-fetch credentials. A failed roll fails the step;
  # Secrets Manager retries it (the label move is idempotent).
  DbAdminLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${NamePrefix}-db-admin'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole'
      Policies:
        - PolicyName: db-admin
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadMasterSecret
                Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  Fn::ImportValue: !Sub '${NamePrefix}-db-secret-arn'
              - Sid: ManageAppSecret
                Effect: Allow
                Action:
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                  - secretsmanager:UpdateSecretVersionStage
                Resource: !Ref DbAppUserSecret
              - Sid: RandomPassword
                Effect: Allow
                Action: secretsmanager:GetRandomPassword
                Resource: '*'
              - Sid: CmkForSecrets
                Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource:
                  Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'
              - Sid: RollGatewayService
                Effect: Allow
                Action: ecs:UpdateService
                Resource: !Sub 'arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:service/${Cluster}/${NamePrefix}-gateway'

  # Pre-create the Lambdas' log groups (names fixed by Lambda:
  # /aws/lambda/<FunctionName>) so the bootstrap/rotation history is
  # CMK-encrypted, retention-managed, and survives teardown - Lambda
  # otherwise auto-creates them with default SSE, no retention, and no
  # CloudFormation ownership. Each function depends on its group because
  # the bootstrap custom resource invokes DURING stack creation.
  # EXISTING DEPLOYMENTS: if Lambda already auto-created these groups, the
  # stack update FAILS on the name collision - export/delete the
  # auto-created groups first (see the runbook note).
  DbBootstrapLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/lambda/${NamePrefix}-db-bootstrap'
      RetentionInDays: 365
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'

  DbRotationLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/lambda/${NamePrefix}-db-rotation'
      RetentionInDays: 365
      KmsKeyId:
        Fn::ImportValue: !Sub '${NamePrefix}-kms-key-arn'

  DbBootstrapFunction:
    Type: AWS::Lambda::Function
    DependsOn: DbBootstrapLogGroup
    Properties:
      FunctionName: !Sub '${NamePrefix}-db-bootstrap'
      Description: One-time creation of the least-privilege application DB users.
      PackageType: Image
      Code:
        ImageUri: !Ref DbAdminLambdaImage
      ImageConfig:
        Command: [app.bootstrap_handler]
      Timeout: 120
      MemorySize: 256
      Role: !GetAtt DbAdminLambdaRole.Arn
      VpcConfig:
        SubnetIds: !Ref PrivateSubnetIds
        SecurityGroupIds:
          - !Ref DbAdminLambdaSecurityGroup
          - Fn::ImportValue: !Sub '${NamePrefix}-db-client-sg'
      Environment:
        Variables:
          MASTER_SECRET_ARN:
            Fn::ImportValue: !Sub '${NamePrefix}-db-secret-arn'
          APP_SECRET_ARN: !Ref DbAppUserSecret
          PGHOST:
            Fn::ImportValue: !Sub '${NamePrefix}-db-endpoint'
          PGPORT:
            Fn::ImportValue: !Sub '${NamePrefix}-db-port'
          PGDATABASE:
            Fn::ImportValue: !Sub '${NamePrefix}-db-name'

  DbBootstrap:
    Type: Custom::DbAppUserBootstrap
    Properties:
      ServiceToken: !GetAtt DbBootstrapFunction.Arn
      # Fail the stack in minutes, not the ~1-hour default, if the bootstrap
      # Lambda never responds (e.g. it can't start, or hangs with no DB
      # route). Comfortably above a normal run (VPC cold start + a few SQL
      # statements, ~tens of seconds) and the Lambda's own 120s timeout.
      ServiceTimeout: 300
      # Bump to force a re-run (idempotent: converges roles/grants, never
      # resets live passwords).
      ConfigVersion: '1'

  DbRotationFunction:
    Type: AWS::Lambda::Function
    DependsOn: DbRotationLogGroup
    Properties:
      FunctionName: !Sub '${NamePrefix}-db-rotation'
      Description: Alternating-users rotation for the app DB secret; rolls the gateway service.
      PackageType: Image
      Code:
        ImageUri: !Ref DbAdminLambdaImage
      ImageConfig:
        Command: [app.rotate_handler]
      Timeout: 120
      MemorySize: 256
      Role: !GetAtt DbAdminLambdaRole.Arn
      VpcConfig:
        SubnetIds: !Ref PrivateSubnetIds
        SecurityGroupIds:
          - !Ref DbAdminLambdaSecurityGroup
          - Fn::ImportValue: !Sub '${NamePrefix}-db-client-sg'
      Environment:
        Variables:
          MASTER_SECRET_ARN:
            Fn::ImportValue: !Sub '${NamePrefix}-db-secret-arn'
          APP_SECRET_ARN: !Ref DbAppUserSecret
          PGHOST:
            Fn::ImportValue: !Sub '${NamePrefix}-db-endpoint'
          PGPORT:
            Fn::ImportValue: !Sub '${NamePrefix}-db-port'
          PGDATABASE:
            Fn::ImportValue: !Sub '${NamePrefix}-db-name'
          ECS_CLUSTER: !Ref Cluster
          ECS_SERVICE: !GetAtt Service.Name

  DbRotationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DbRotationFunction
      Action: lambda:InvokeFunction
      Principal: secretsmanager.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  DbAppSecretRotation:
    Type: AWS::SecretsManager::RotationSchedule
    # Service (and therefore DbBootstrap) must exist: schedule creation
    # triggers an immediate first rotation, which flips to the clone user
    # and rolls the service. Rotation is ASYNCHRONOUS - the stack goes
    # green regardless of the first rotation's outcome, so check the
    # db-rotation log group (or the alarm below) after first deploy. At a
    # 90-day cadence the image Lambda will be Inactive when each rotation
    # fires; the first invoke fails while Lambda re-optimizes the image
    # and Secrets Manager's own retries then complete the rotation.
    DependsOn: [Service, DbRotationInvokePermission]
    Properties:
      SecretId: !Ref DbAppUserSecret
      RotationLambdaARN: !GetAtt DbRotationFunction.Arn
      RotateImmediatelyOnUpdate: true
      RotationRules:
        ScheduleExpression: !Sub 'rate(${AppSecretRotationDays} days)'

  # -------------------------------------------------- optional VPC endpoints
  # The db-admin Lambda (bootstrap + rotation) lives in the VPC to reach
  # Postgres; it also calls Secrets Manager and ECS (via the endpoints in
  # a no-NAT spoke, or NAT otherwise).
  DbAdminLambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${NamePrefix} - db-admin Lambda (bootstrap + rotation)'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Secrets Manager + ECS APIs
      Tags:
        - Key: Name
          Value: !Sub '${NamePrefix}-db-admin'

  EndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: WantAnyInterfaceEndpoint
    Properties:
      GroupDescription: !Sub '${NamePrefix} - interface VPC endpoints'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref ServiceSecurityGroup
          Description: TLS from gateway tasks
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref DbAdminLambdaSecurityGroup
          Description: TLS from the db-admin Lambda
      # Endpoint ENIs never initiate connections.
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 127.0.0.1/32
          Description: no egress

  # In-VPC operator/build host (private DNS forces its AWS API calls onto
  # these endpoints; without this rule they black-hole). Separate resource,
  # not an inline rule, so it exists only when the SG is supplied.
  AdminToEndpointsIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: WantAdminEndpointIngress
    Properties:
      GroupId: !Ref EndpointSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref AdminClientSecurityGroupId
      Description: TLS from the in-VPC operator/build host

  BedrockRuntimeEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: WantBedrockEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.bedrock-runtime'
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: !If [WantBedrockPrivateDns, true, false]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ClaudeOnlyThroughThisEndpoint
            Effect: Allow
            Principal: '*'
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
            # Mirrors the task-role scoping: the two configured models only.
            Resource:
              - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${OpusBedrockModelId}'
              - !Sub 'arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/${SonnetBedrockModelId}'
              - !Sub
                - 'arn:${AWS::Partition}:bedrock:*::foundation-model/${Model}'
                - Model: !Join ['', !Split ['us-gov.', !Ref OpusBedrockModelId]]
              - !Sub
                - 'arn:${AWS::Partition}:bedrock:*::foundation-model/${Model}'
                - Model: !Join ['', !Split ['us-gov.', !Ref SonnetBedrockModelId]]

  # Endpoints Fargate itself depends on when the private subnets have no NAT:
  # image pull (ecr.api + ecr.dkr + S3 for layer blobs), awslogs (logs), and
  # task secret injection (secretsmanager). RDS needs no endpoint - the DB is
  # in-VPC. Okta remains an external HTTPS dependency no endpoint can cover.
  # Every endpoint carries a policy (SC-7 defense-in-depth): the network
  # path enforces "this account's resources only" even if an IAM policy is
  # ever over-broadened.
  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: WantEcrApiEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.api'
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: true
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AuthTokenHasNoResource
            Effect: Allow
            Principal: '*'
            Action: ecr:GetAuthorizationToken
            Resource: '*'
          - Sid: ThisAccountRepositoriesOnly
            Effect: Allow
            Principal: '*'
            Action:
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
            Resource: !Sub 'arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/*'

  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: WantEcrDkrEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.dkr'
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: true
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AuthTokenHasNoResource
            Effect: Allow
            Principal: '*'
            Action: ecr:GetAuthorizationToken
            Resource: '*'
          - Sid: ThisAccountRepositoriesOnly
            Effect: Allow
            Principal: '*'
            Action:
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
            Resource: !Sub 'arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/*'

  LogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: WantLogsEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.logs'
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: true
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ThisAccountLogGroupsOnly
            Effect: Allow
            Principal: '*'
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogStreams
              - logs:PutRetentionPolicy
            Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*'

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: WantSecretsManagerEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.secretsmanager'
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: true
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: GatewaySecretsOnly
            Effect: Allow
            Principal: '*'
            # Tasks read; the db-admin Lambda also describes, writes, and
            # re-stages during rotation. Scoped to this stack's named
            # secrets plus the RDS-managed master secret (random rds! name).
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
              - secretsmanager:PutSecretValue
              - secretsmanager:UpdateSecretVersionStage
            Resource:
              - !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${NamePrefix}/*'
              - !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:rds!*'
          - Sid: RandomPasswordHasNoResource
            Effect: Allow
            Principal: '*'
            Action: secretsmanager:GetRandomPassword
            Resource: '*'

  # ECS control-plane API - needed by the db-admin rotation Lambda's
  # UpdateService call from inside a no-NAT spoke (Fargate tasks themselves
  # do not need it on platform 1.4). Deliberately NO PolicyDocument: not
  # every GovCloud endpoint supports policies and an unsupported one fails
  # the whole stack; the equivalent scoping already lives on
  # DbAdminLambdaRole (ecs:UpdateService on the one service ARN).
  EcsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: WantEcsEndpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Interface
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecs'
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: true

  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: WantS3Endpoint
    Properties:
      VpcId: !Ref VpcId
      VpcEndpointType: Gateway
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      RouteTableIds: !Ref PrivateRouteTableIds
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # ECR serves image layers from this AWS-owned regional bucket -
          # without it, pulls fail with a misleading auth error.
          - Sid: EcrLayerBucket
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::prod-${AWS::Region}-starport-layer-bucket/*'
          # CloudFormation custom resources respond via a presigned PUT to
          # an AWS-owned bucket; the gateway-endpoint route captures that
          # traffic, and blocking it hangs every DbBootstrap create/delete
          # for ~an hour.
          - Sid: CfnCustomResourceResponses
            Effect: Allow
            Principal: '*'
            Action: s3:PutObject
            Resource: !Sub 'arn:${AWS::Partition}:s3:::cloudformation-custom-resource-response-*/*'
          - Sid: ThisAccountBucketsOnly
            Effect: Allow
            Principal: '*'
            Action: 's3:*'
            Resource: '*'
            Condition:
              StringEquals:
                aws:ResourceAccount: !Ref AWS::AccountId

  # Rotation failures are otherwise silent (rotation is asynchronous and
  # retried; nothing else surfaces a permanently failing rotation). The
  # threshold tolerates the expected single Inactive-state error per
  # scheduled rotation (see DbAppSecretRotation comment).
  DbRotationFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${NamePrefix}-db-rotation-errors'
      AlarmDescription: >-
        The app DB secret rotation Lambda is erroring repeatedly. Check
        its log group; if rotation stays wedged, tasks keep working on the
        current credential but the rotation SLA is not being met.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref DbRotationFunction
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HaveAlarmTopic, [!Ref AlarmSnsTopicArn], !Ref 'AWS::NoValue']

  # ------------------------------------------------------------------ alarms
  # Imported ACM certificates do NOT auto-renew; ACM publishes DaysToExpiry
  # daily for every certificate. This alarm is the renewal reminder.
  CertificateExpiryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${NamePrefix}-certificate-expiry'
      AlarmDescription: !Sub >-
        The ${NamePrefix} gateway certificate expires in
        ${CertExpiryAlarmDays} days or fewer. Imported ACM certificates do
        not auto-renew: re-issue with the enterprise CA, publish the new
        SHA-256 fingerprint to developers, then re-run
        import-enterprise-cert.sh import --certificate-arn to replace
        in place.
      Namespace: AWS/CertificateManager
      MetricName: DaysToExpiry
      Dimensions:
        - Name: CertificateArn
          Value: !Ref CertificateArn
      Statistic: Minimum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: !Ref CertExpiryAlarmDays
      ComparisonOperator: LessThanOrEqualToThreshold
      TreatMissingData: ignore
      AlarmActions: !If [HaveAlarmTopic, [!Ref AlarmSnsTopicArn], !Ref 'AWS::NoValue']

Outputs:
  AlbDnsName:
    Description: >-
      CNAME target. Create in corporate DNS:
      <GatewayFqdn>  CNAME  <this value>  - then bypass that FQDN in Zscaler
      (ZIA SSL-inspection exemption, or ZPA app segment for the FQDN).
    Value: !GetAtt LoadBalancer.DNSName
  GatewayUrl:
    Description: >-
      The gateway's public FQDN - the Okta redirect host, and the URL developers
      paste at interactive /login. When an org enforces forced login via GPO/MDM
      it is the forceLoginGatewayUrl value (see docs/client-config.md); the
      installer itself does not write it.
    Value: !Sub 'https://${GatewayFqdn}'
  OktaRedirectUri:
    Value: !Sub 'https://${GatewayFqdn}/oauth/callback'
  OktaClientSecretArn:
    Description: 'Set the real secret: aws secretsmanager put-secret-value --secret-id <arn> --secret-string <value>'
    Value: !Ref OktaClientSecret
  ClusterName:
    Value: !Ref Cluster
  ServiceName:
    Value: !Sub '${NamePrefix}-gateway'
  AlbLogsBucketName:
    Description: S3 bucket receiving ALB access logs (expires per AlbLogRetentionDays).
    Value: !Ref AlbLogsBucket
  # Cross-stack exports for 03-observability.yaml
  ServiceSecurityGroupId:
    Description: Gateway task SG - 03 adds its egress to the aps-workspaces endpoint (remote_write from the telemetry sidecar).
    Value: !Ref ServiceSecurityGroup
    Export:
      Name: !Sub '${NamePrefix}-svc-sg'
  AlbSecurityGroupId:
    Description: ALB SG - Grafana allows ingress from it.
    Value: !Ref AlbSecurityGroup
    Export:
      Name: !Sub '${NamePrefix}-alb-sg'
  HttpsListenerArn:
    Description: HTTPS listener - the observability stack attaches the /grafana rule to it.
    Value: !Ref HttpsListener
    Export:
      Name: !Sub '${NamePrefix}-https-listener'
  ClusterArnExport:
    Description: ECS cluster shared with the observability services.
    Value: !GetAtt Cluster.Arn
    Export:
      Name: !Sub '${NamePrefix}-cluster-arn'
  # Only when the shared Fargate interface endpoints exist (their private DNS
  # forces VPC-wide traffic onto them). 03 imports this to add Grafana-task
  # ingress so it can reach ecr/logs/secretsmanager; without it its 443 is
  # dropped and 03 never reaches steady state. The SG itself exists under
  # WantAnyInterfaceEndpoint, a superset of WantSupportingEndpoints.
  EndpointSecurityGroupId:
    Condition: WantSupportingEndpoints
    Description: Shared interface-endpoint SG; 03 adds Grafana-task ingress to it.
    Value: !Ref EndpointSecurityGroup
    Export:
      Name: !Sub '${NamePrefix}-endpoint-sg'
